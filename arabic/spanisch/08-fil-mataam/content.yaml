version: 1
number: 8
title: "في المطعم"
description: "الطلب وتسمية الأطباق والدفع في مطعم إسباني"
sections:
  - title: "الطلب"
    explanation: |
      **الطلب في المطعم** يتطلب عبارات مهذبة.
      «Quisiera» و«para mí» هما الأكثر أناقة.
      «¿Me trae...?» تعني حرفياً «هل تحضر لي...؟» وهي شائعة جداً.
    examples:
      - q: "Quisiera..."
        a: "أودّ..."
        rel:
          - ["quisiera", "أودّ / أرغب", "فعل querer، صيغة الشرط الماضي"]
      - q: "Para mí..."
        a: "لي..."
        rel:
          - ["para", "لـ", "حرف جر"]
          - ["mí", "أنا / لي", "ضمير شخصي مشدد"]
      - q: "¿Me trae...?"
        a: "هل تحضر لي...؟"
        rel:
          - ["me", "لي", "ضمير شخصي، مفعول غير مباشر"]
          - ["trae", "يُحضر", "فعل traer، الغائب"]
      - q: "¿Qué recomienda?"
        a: "بماذا توصي؟"
        rel:
          - ["recomienda", "يوصي", "فعل recomendar، الغائب"]
      - q: "La carta, por favor"
        a: "قائمة الطعام، من فضلك"
        rel:
          - ["carta", "رسالة / قائمة طعام", "اسم، مؤنث"]
          - ["por favor", "من فضلك", "عبارة مهذبة"]
  - title: "الأطباق"
    explanation: |
      **الأطباق النموذجية** للمطبخ الإسباني معروفة عالمياً.
      التاباس والباييا والغازباتشو مجرد أمثلة قليلة.
      في المطاعم يوجد غالباً «menú del día» – قائمة يومية بسعر مناسب.
    examples:
      - q: "la sopa"
        a: "الحساء"
        rel:
          - ["sopa", "حساء", "اسم، مؤنث"]
      - q: "la ensalada"
        a: "السلطة"
        rel:
          - ["ensalada", "سلطة", "اسم، مؤنث"]
      - q: "el filete"
        a: "شريحة اللحم"
        rel:
          - ["filete", "شريحة لحم / فيليه", "اسم، مذكر"]
      - q: "el pollo"
        a: "الدجاج"
        rel:
          - ["pollo", "دجاج", "اسم، مذكر"]
      - q: "los mariscos"
        a: "المأكولات البحرية"
        rel:
          - ["mariscos", "مأكولات بحرية", "اسم، مذكر جمع"]
      - q: "el postre"
        a: "الحلوى"
        rel:
          - ["postre", "حلوى / تحلية", "اسم، مذكر"]
      - q: "el vino"
        a: "النبيذ"
        rel:
          - ["vino", "نبيذ", "اسم، مذكر"]
      - q: "la cerveza"
        a: "البيرة"
        rel:
          - ["cerveza", "بيرة", "اسم، مؤنث"]
  - title: "الدفع"
    explanation: |
      **عند الدفع** «La cuenta, por favor» هي أهم جملة.
      في إسبانيا البقشيش (propina) اختياري لكنه محبب.
      بطاقات الائتمان لا تُقبل في كل مكان – اسأل مسبقاً!
    examples:
      - q: "La cuenta, por favor"
        a: "الفاتورة، من فضلك"
        rel:
          - ["cuenta", "فاتورة / حساب", "اسم، مؤنث"]
      - q: "¿Está incluido el servicio?"
        a: "هل الخدمة مشمولة؟"
        rel:
          - ["incluido", "مشمول", "اسم مفعول"]
          - ["servicio", "خدمة", "اسم، مذكر"]
      - q: "¿Se puede pagar con tarjeta?"
        a: "هل يمكن الدفع بالبطاقة؟"
        rel:
          - ["se puede", "يمكن", "بناء انعكاسي + فعل poder"]
          - ["pagar", "يدفع", "مصدر"]
          - ["tarjeta", "بطاقة", "اسم، مؤنث"]
      - q: "propina"
        a: "بقشيش"
        rel:
          - ["propina", "بقشيش", "اسم، مؤنث"]
