version: 1
number: 7
title: "الألوان والصفات"
description: "الألوان والأحجام والخصائص باللغة الإسبانية"
sections:
  - title: "الألوان"
    explanation: |
      **الألوان** في الإسبانية صفات تتطابق مع الاسم.
      بعض الألوان لها شكل واحد للمذكر والمؤنث (مثل azul، verde).
      الألوان تأتي عادة بعد الاسم: «el coche rojo» (السيارة الحمراء).
    examples:
      - q: "rojo / roja"
        a: "أحمر"
        rel:
          - ["rojo", "أحمر (مذكر)", "صفة لون"]
          - ["roja", "حمراء (مؤنث)", "صفة لون"]
      - q: "azul"
        a: "أزرق"
        rel:
          - ["azul", "أزرق", "صفة لون، لا تتغير"]
      - q: "verde"
        a: "أخضر"
        rel:
          - ["verde", "أخضر", "صفة لون، لا تتغير"]
      - q: "amarillo / amarilla"
        a: "أصفر"
        rel:
          - ["amarillo", "أصفر (مذكر)", "صفة لون"]
      - q: "blanco / blanca"
        a: "أبيض"
        rel:
          - ["blanco", "أبيض (مذكر)", "صفة لون"]
      - q: "negro / negra"
        a: "أسود"
        rel:
          - ["negro", "أسود (مذكر)", "صفة لون"]
      - q: "naranja"
        a: "برتقالي"
        rel:
          - ["naranja", "برتقالي", "صفة لون، لا تتغير"]
      - q: "rosa"
        a: "وردي"
        rel:
          - ["rosa", "وردي", "صفة لون، لا تتغير"]
      - q: "marrón"
        a: "بني"
        rel:
          - ["marrón", "بني", "صفة لون"]
      - q: "gris"
        a: "رمادي"
        rel:
          - ["gris", "رمادي", "صفة لون، لا تتغير"]
  - title: "الحجم والشكل"
    explanation: |
      **الحجم والشكل** يُوصفان بصفات تأتي بعد الاسم.
      «Grande» تُختصر إلى «gran» قبل الاسم: «un gran hombre» (رجل عظيم).
      هذه الصفات مفيدة لوصف الأشياء.
    examples:
      - q: "grande"
        a: "كبير"
        rel:
          - ["grande", "كبير", "صفة"]
      - q: "pequeño / pequeña"
        a: "صغير"
        rel:
          - ["pequeño", "صغير (مذكر)", "صفة"]
      - q: "largo / larga"
        a: "طويل"
        rel:
          - ["largo", "طويل (مذكر)", "صفة"]
      - q: "corto / corta"
        a: "قصير"
        rel:
          - ["corto", "قصير (مذكر)", "صفة"]
      - q: "redondo / redonda"
        a: "مستدير"
        rel:
          - ["redondo", "مستدير (مذكر)", "صفة"]
      - q: "cuadrado / cuadrada"
        a: "مربع"
        rel:
          - ["cuadrado", "مربع (مذكر)", "صفة"]
  - title: "الخصائص"
    explanation: |
      **الخصائص** تساعد في وصف الأشياء والأشخاص.
      بهذه الصفات يمكنك وصف الأشياء والمواقف والتجارب
      بدقة. انتبه لتطابق الجنس!
    examples:
      - q: "nuevo / nueva"
        a: "جديد"
        rel:
          - ["nuevo", "جديد (مذكر)", "صفة"]
      - q: "viejo / vieja"
        a: "قديم"
        rel:
          - ["viejo", "قديم (مذكر)", "صفة"]
      - q: "bonito / bonita"
        a: "جميل"
        rel:
          - ["bonito", "جميل (مذكر)", "صفة"]
      - q: "feo / fea"
        a: "قبيح"
        rel:
          - ["feo", "قبيح (مذكر)", "صفة"]
      - q: "rápido / rápida"
        a: "سريع"
        rel:
          - ["rápido", "سريع (مذكر)", "صفة"]
      - q: "lento / lenta"
        a: "بطيء"
        rel:
          - ["lento", "بطيء (مذكر)", "صفة"]
      - q: "fácil"
        a: "سهل"
        rel:
          - ["fácil", "سهل", "صفة، لا تتغير"]
      - q: "difícil"
        a: "صعب"
        rel:
          - ["difícil", "صعب", "صفة، لا تتغير"]
