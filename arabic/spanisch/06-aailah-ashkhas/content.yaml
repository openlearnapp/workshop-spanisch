version: 1
number: 6
title: "العائلة والأشخاص"
description: "أفراد العائلة ووصف الأشخاص والعلاقات باللغة الإسبانية"
sections:
  - title: "العائلة"
    explanation: |
      **أفراد العائلة** في الإسبانية غالباً لها شكل مذكر ومؤنث.
      «Los abuelos» يمكن أن تعني «الأجداد» أو «الجدّان» –
      الجمع المذكر في الإسبانية غالباً يشمل الجنسين.
    examples:
      - q: "la madre"
        a: "الأم"
        rel:
          - ["madre", "أم", "اسم، مؤنث"]
      - q: "el padre"
        a: "الأب"
        rel:
          - ["padre", "أب", "اسم، مذكر"]
      - q: "el hermano"
        a: "الأخ"
        rel:
          - ["hermano", "أخ", "اسم، مذكر"]
      - q: "la hermana"
        a: "الأخت"
        rel:
          - ["hermana", "أخت", "اسم، مؤنث"]
      - q: "los abuelos"
        a: "الأجداد"
        rel:
          - ["abuelos", "أجداد", "اسم، مذكر جمع"]
      - q: "el hijo"
        a: "الابن"
        rel:
          - ["hijo", "ابن", "اسم، مذكر"]
      - q: "la hija"
        a: "الابنة"
        rel:
          - ["hija", "ابنة", "اسم، مؤنث"]
      - q: "los tíos"
        a: "الأعمام والعمات"
        rel:
          - ["tíos", "أعمام (جمع، يشمل العمات)", "اسم، مذكر جمع"]
  - title: "الأوصاف"
    explanation: |
      **الصفات** في الإسبانية تتطابق مع جنس الاسم.
      المذكر ينتهي غالباً بـ -o والمؤنث بـ -a.
      مثال: alto (طويل، مذكر) → alta (طويلة، مؤنث).
    examples:
      - q: "joven"
        a: "شاب / شابة"
        rel:
          - ["joven", "شاب", "صفة، لا تتغير"]
      - q: "viejo / vieja"
        a: "كبير في السن"
        rel:
          - ["viejo", "كبير في السن (مذكر)", "صفة"]
          - ["vieja", "كبيرة في السن (مؤنث)", "صفة"]
      - q: "alto / alta"
        a: "طويل القامة"
        rel:
          - ["alto", "طويل (مذكر)", "صفة"]
          - ["alta", "طويلة (مؤنث)", "صفة"]
      - q: "bajo / baja"
        a: "قصير القامة"
        rel:
          - ["bajo", "قصير (مذكر)", "صفة"]
          - ["baja", "قصيرة (مؤنث)", "صفة"]
      - q: "delgado / delgada"
        a: "نحيف"
        rel:
          - ["delgado", "نحيف (مذكر)", "صفة"]
      - q: "gordo / gorda"
        a: "سمين"
        rel:
          - ["gordo", "سمين (مذكر)", "صفة"]
      - q: "guapo / guapa"
        a: "وسيم / جميلة"
        rel:
          - ["guapo", "وسيم (مذكر)", "صفة"]
      - q: "simpático / simpática"
        a: "لطيف / ودود"
        rel:
          - ["simpático", "لطيف (مذكر)", "صفة"]
  - title: "العلاقات"
    explanation: |
      **العلاقات** في الإسبانية غالباً تُستخدم مع أداة التعريف.
      في المخاطبة المباشرة أو مع ضمائر الملكية تُحذف أداة التعريف.
      مثال: «mi amigo» (صديقي)، لكن «el amigo de María».
    examples:
      - q: "el amigo / la amiga"
        a: "الصديق / الصديقة"
        rel:
          - ["amigo", "صديق", "اسم، مذكر"]
          - ["amiga", "صديقة", "اسم، مؤنث"]
      - q: "el novio / la novia"
        a: "الحبيب / الحبيبة"
        rel:
          - ["novio", "حبيب / خطيب", "اسم، مذكر"]
          - ["novia", "حبيبة / خطيبة", "اسم، مؤنث"]
      - q: "el marido"
        a: "الزوج"
        rel:
          - ["marido", "زوج", "اسم، مذكر"]
      - q: "la mujer"
        a: "المرأة / الزوجة"
        rel:
          - ["mujer", "امرأة / زوجة", "اسم، مؤنث"]
      - q: "los padres"
        a: "الوالدان"
        rel:
          - ["padres", "والدان / آباء", "اسم، مذكر جمع"]
      - q: "los hijos"
        a: "الأبناء"
        rel:
          - ["hijos", "أبناء", "اسم، مذكر جمع"]
