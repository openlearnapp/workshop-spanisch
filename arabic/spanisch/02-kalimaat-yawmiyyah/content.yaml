version: 1
number: 2
title: "كلمات يومية"
description: "كلمات وتعبيرات أساسية للاستخدام اليومي باللغة الإسبانية"
sections:
  - title: "كلمات أساسية"
    explanation: |
      **الكلمات الأساسية** هي لبنات بناء أي لغة.
      هذه الكلمات المستخدمة بكثرة تساعدك على تكوين جمل بسيطة بالإسبانية
      والتواصل في المواقف اليومية.
    examples:
      - q: "sí"
        a: "نعم"
        rel:
          - ["sí", "نعم", "حرف"]
      - q: "no"
        a: "لا"
        rel:
          - ["no", "لا / ليس", "حرف / نفي"]
      - q: "y"
        a: "و"
        rel:
          - ["y", "و", "حرف عطف"]
      - q: "o"
        a: "أو"
        rel:
          - ["o", "أو", "حرف عطف"]
      - q: "pero"
        a: "لكن"
        rel:
          - ["pero", "لكن", "حرف عطف"]
      - q: "porque"
        a: "لأن"
        rel:
          - ["porque", "لأن", "حرف عطف"]
      - q: "también"
        a: "أيضاً"
        rel:
          - ["también", "أيضاً", "ظرف"]
      - q: "muy"
        a: "جداً"
        rel:
          - ["muy", "جداً", "ظرف"]
      - q: "bien"
        a: "جيد"
        rel:
          - ["bien", "جيد", "ظرف"]
      - q: "mal"
        a: "سيئ"
        rel:
          - ["mal", "سيئ", "ظرف"]
  - title: "أسئلة"
    explanation: |
      **كلمات الاستفهام** ضرورية للحصول على المعلومات.
      في الإسبانية تبدأ الأسئلة بعلامة استفهام مقلوبة (¿).
      هذه الكلمات الاستفهامية تساعدك في مختلف المواقف.
    examples:
      - q: "¿Qué?"
        a: "ماذا؟"
        rel:
          - ["qué", "ماذا", "كلمة استفهام"]
      - q: "¿Quién?"
        a: "مَن؟"
        rel:
          - ["quién", "مَن", "كلمة استفهام"]
      - q: "¿Dónde?"
        a: "أين؟"
        rel:
          - ["dónde", "أين", "كلمة استفهام"]
      - q: "¿Cuándo?"
        a: "متى؟"
        rel:
          - ["cuándo", "متى", "كلمة استفهام"]
      - q: "¿Por qué?"
        a: "لماذا؟"
        rel:
          - ["por qué", "لماذا", "كلمة استفهام"]
      - q: "¿Cómo?"
        a: "كيف؟"
        rel:
          - ["cómo", "كيف", "كلمة استفهام"]
      - q: "¿Cuánto?"
        a: "كم؟"
        rel:
          - ["cuánto", "كم", "كلمة استفهام"]
  - title: "أيام الأسبوع"
    explanation: |
      **أيام الأسبوع** بالإسبانية تُكتب بحرف صغير.
      يبدأ الأسبوع تقليدياً بيوم الاثنين (lunes).
      نهاية الأسبوع تُسمى «el fin de semana».
    examples:
      - q: "lunes"
        a: "الاثنين"
        rel:
          - ["lunes", "الاثنين", "يوم من أيام الأسبوع"]
      - q: "martes"
        a: "الثلاثاء"
        rel:
          - ["martes", "الثلاثاء", "يوم من أيام الأسبوع"]
      - q: "miércoles"
        a: "الأربعاء"
        rel:
          - ["miércoles", "الأربعاء", "يوم من أيام الأسبوع"]
      - q: "jueves"
        a: "الخميس"
        rel:
          - ["jueves", "الخميس", "يوم من أيام الأسبوع"]
      - q: "viernes"
        a: "الجمعة"
        rel:
          - ["viernes", "الجمعة", "يوم من أيام الأسبوع"]
      - q: "sábado"
        a: "السبت"
        rel:
          - ["sábado", "السبت", "يوم من أيام الأسبوع"]
      - q: "domingo"
        a: "الأحد"
        rel:
          - ["domingo", "الأحد", "يوم من أيام الأسبوع"]
