version: 1
number: 10
title: "الأفعال والحياة اليومية"
description: "أفعال مهمة وروتين يومي باللغة الإسبانية"
sections:
  - title: "أفعال مهمة"
    explanation: |
      **أهم الأفعال الإسبانية** غالباً شاذة لكنها ضرورية.
      الأهم: **ser** مقابل **estar** – كلاهما يعني «يكون»، لكن:
      Ser للصفات الدائمة والجنسية والوقت. Estar للحالات المؤقتة والأماكن.
    examples:
      - q: "ser / estar"
        a: "يكون"
        rel:
          - ["ser", "يكون (دائم)", "فعل، شاذ"]
          - ["estar", "يكون (مؤقت / مكان)", "فعل، شاذ"]
      - q: "tener"
        a: "يملك"
        rel:
          - ["tener", "يملك", "فعل، شاذ"]
      - q: "ir"
        a: "يذهب"
        rel:
          - ["ir", "يذهب", "فعل، شاذ"]
      - q: "querer"
        a: "يريد / يحب"
        rel:
          - ["querer", "يريد / يحب", "فعل، شاذ (e→ie)"]
      - q: "poder"
        a: "يستطيع"
        rel:
          - ["poder", "يستطيع", "فعل، شاذ (o→ue)"]
      - q: "saber"
        a: "يعرف / يتقن"
        rel:
          - ["saber", "يعرف / يتقن", "فعل، شاذ"]
      - q: "hacer"
        a: "يفعل / يصنع"
        rel:
          - ["hacer", "يفعل / يصنع", "فعل، شاذ"]
      - q: "decir"
        a: "يقول"
        rel:
          - ["decir", "يقول", "فعل، شاذ"]
  - title: "الحياة اليومية"
    explanation: |
      **الروتين اليومي** في الإسبانية يُعبَّر عنه غالباً بأفعال انعكاسية.
      «Levantarse» (يستيقظ)، «ducharse» (يستحم) – الضمير الانعكاسي يدل
      على أن الفعل موجه إلى الشخص نفسه.
    examples:
      - q: "levantarse"
        a: "يستيقظ / ينهض"
        rel:
          - ["levantarse", "يستيقظ", "فعل انعكاسي"]
          - ["levantar", "يرفع", "فعل أساسي"]
      - q: "desayunar"
        a: "يتناول الفطور"
        rel:
          - ["desayunar", "يتناول الفطور", "فعل"]
      - q: "trabajar"
        a: "يعمل"
        rel:
          - ["trabajar", "يعمل", "فعل، منتظم"]
      - q: "comer"
        a: "يأكل / يتغدى"
        rel:
          - ["comer", "يأكل", "فعل، منتظم"]
      - q: "dormir"
        a: "ينام"
        rel:
          - ["dormir", "ينام", "فعل، شاذ (o→ue)"]
      - q: "ducharse"
        a: "يستحم"
        rel:
          - ["ducharse", "يستحم", "فعل انعكاسي"]
          - ["ducha", "دُش", "اسم، مؤنث"]
  - title: "في المكتب"
    explanation: |
      **في المكتب والعمل** تحتاج إلى مفردات خاصة.
      الكلمة الإسبانية «ordenador» (حاسوب) تُستخدم خاصة في إسبانيا –
      في أمريكا اللاتينية يُقال «computadora» أو «computador».
    examples:
      - q: "el trabajo"
        a: "العمل / الوظيفة"
        rel:
          - ["trabajo", "عمل / وظيفة", "اسم، مذكر"]
      - q: "la oficina"
        a: "المكتب"
        rel:
          - ["oficina", "مكتب", "اسم، مؤنث"]
      - q: "el ordenador"
        a: "الحاسوب"
        rel:
          - ["ordenador", "حاسوب (إسبانيا)", "اسم، مذكر"]
      - q: "la reunión"
        a: "الاجتماع"
        rel:
          - ["reunión", "اجتماع / لقاء", "اسم، مؤنث"]
      - q: "el jefe / la jefa"
        a: "المدير / المديرة"
        rel:
          - ["jefe", "مدير (مذكر)", "اسم"]
          - ["jefa", "مديرة (مؤنث)", "اسم"]
      - q: "el colega"
        a: "الزميل"
        rel:
          - ["colega", "زميل / زميلة", "اسم، مذكر/مؤنث"]
