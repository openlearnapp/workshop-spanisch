version: 1
number: 3
title: "الأرقام والوقت"
description: "الأرقام من ١ إلى ١٠٠٠ والتعبير عن الوقت باللغة الإسبانية"
sections:
  - title: "الأرقام ١ إلى ٢٠"
    explanation: |
      **الأرقام من ١ إلى ٢٠** في الإسبانية غير منتظمة ويجب حفظها.
      من ١٦ فصاعداً تُكتب ككلمة واحدة (dieciséis إلخ).
      هذه الأرقام تشكل أساس جميع الأرقام الأكبر.
    examples:
      - q: "uno / dos / tres"
        a: "واحد / اثنان / ثلاثة"
        rel:
          - ["uno", "واحد", "عدد أساسي"]
          - ["dos", "اثنان", "عدد أساسي"]
          - ["tres", "ثلاثة", "عدد أساسي"]
      - q: "cuatro / cinco / seis"
        a: "أربعة / خمسة / ستة"
        rel:
          - ["cuatro", "أربعة", "عدد أساسي"]
          - ["cinco", "خمسة", "عدد أساسي"]
          - ["seis", "ستة", "عدد أساسي"]
      - q: "siete / ocho / nueve"
        a: "سبعة / ثمانية / تسعة"
        rel:
          - ["siete", "سبعة", "عدد أساسي"]
          - ["ocho", "ثمانية", "عدد أساسي"]
          - ["nueve", "تسعة", "عدد أساسي"]
      - q: "diez / once / doce"
        a: "عشرة / أحد عشر / اثنا عشر"
        rel:
          - ["diez", "عشرة", "عدد أساسي"]
          - ["once", "أحد عشر", "عدد أساسي"]
          - ["doce", "اثنا عشر", "عدد أساسي"]
      - q: "trece / catorce / quince"
        a: "ثلاثة عشر / أربعة عشر / خمسة عشر"
        rel:
          - ["trece", "ثلاثة عشر", "عدد أساسي"]
          - ["catorce", "أربعة عشر", "عدد أساسي"]
          - ["quince", "خمسة عشر", "عدد أساسي"]
      - q: "dieciséis / diecisiete / dieciocho / diecinueve / veinte"
        a: "ستة عشر / سبعة عشر / ثمانية عشر / تسعة عشر / عشرون"
        rel:
          - ["dieciséis", "ستة عشر", "عدد أساسي"]
          - ["diecisiete", "سبعة عشر", "عدد أساسي"]
          - ["dieciocho", "ثمانية عشر", "عدد أساسي"]
          - ["diecinueve", "تسعة عشر", "عدد أساسي"]
          - ["veinte", "عشرون", "عدد أساسي"]
  - title: "أرقام كبيرة"
    explanation: |
      **الأرقام الأكبر** تتبع نمطاً منتظماً. العشرات تنتهي بـ -enta
      (ما عدا treinta) وتُربط بالآحاد بـ «y» (و).
      مثال: treinta y cinco = ٣٥.
    examples:
      - q: "treinta"
        a: "ثلاثون"
        rel:
          - ["treinta", "ثلاثون", "عدد عشرات"]
      - q: "cuarenta"
        a: "أربعون"
        rel:
          - ["cuarenta", "أربعون", "عدد عشرات"]
      - q: "cincuenta"
        a: "خمسون"
        rel:
          - ["cincuenta", "خمسون", "عدد عشرات"]
      - q: "sesenta / setenta / ochenta / noventa"
        a: "ستون / سبعون / ثمانون / تسعون"
        rel:
          - ["sesenta", "ستون", "عدد عشرات"]
          - ["setenta", "سبعون", "عدد عشرات"]
          - ["ochenta", "ثمانون", "عدد عشرات"]
          - ["noventa", "تسعون", "عدد عشرات"]
      - q: "cien"
        a: "مئة"
        rel:
          - ["cien", "مئة (بالضبط ١٠٠)", "عدد أساسي"]
      - q: "mil"
        a: "ألف"
        rel:
          - ["mil", "ألف", "عدد أساسي"]
  - title: "الساعة"
    explanation: |
      **الساعة** في الإسبانية تُعبَّر عنها بفعل «ser».
      للساعة الواحدة يُقال «es la una»، ولباقي الساعات «son las + رقم».
      الدقائق تُضاف بـ «y» (بعد الساعة الكاملة) أو «menos» (قبل الساعة).
    examples:
      - q: "¿Qué hora es?"
        a: "كم الساعة؟"
        rel:
          - ["qué", "ما / كم", "كلمة استفهام"]
          - ["hora", "ساعة", "اسم"]
      - q: "Son las tres"
        a: "الساعة الثالثة"
        rel:
          - ["son", "هم / هن", "فعل ser، جمع"]
          - ["las", "الـ", "أداة تعريف، جمع مؤنث"]
          - ["tres", "ثلاثة", "عدد أساسي"]
      - q: "Es la una"
        a: "الساعة الواحدة"
        rel:
          - ["es", "هو / هي", "فعل ser، مفرد"]
          - ["la una", "الساعة الواحدة", "مفرد، لأنها ساعة واحدة"]
      - q: "de la mañana"
        a: "صباحاً"
        rel:
          - ["mañana", "صباح / غداً", "اسم / ظرف"]
      - q: "de la tarde"
        a: "بعد الظهر"
        rel:
          - ["tarde", "بعد الظهر / متأخر", "اسم / ظرف"]
      - q: "de la noche"
        a: "مساءً / ليلاً"
        rel:
          - ["noche", "ليل", "اسم"]
