<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b01020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8820a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bgGrad)"/>

  <!-- Spanish flag stripes -->
  <rect width="1280" height="155" y="0" fill="#c60b1e"/>
  <rect width="1280" height="490" y="155" fill="#ffc400"/>
  <rect width="1280" height="155" y="645" fill="#c60b1e"/>

  <!-- Subtle overlay for text readability -->
  <rect width="1280" height="800" fill="rgba(0,0,0,0.35)"/>

  <!-- Center card -->
  <rect x="290" y="180" width="700" height="440" rx="24" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Flag emoji representation: three colored circles -->
  <circle cx="580" cy="300" r="30" fill="#c60b1e" opacity="0.9"/>
  <circle cx="640" cy="300" r="30" fill="#ffc400" opacity="0.9"/>
  <circle cx="700" cy="300" r="30" fill="#c60b1e" opacity="0.9"/>

  <!-- Main title -->
  <text x="640" y="410" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="bold"
        text-anchor="middle" fill="white" letter-spacing="4">Spanisch</text>

  <!-- Subtitle -->
  <text x="640" y="480" font-family="Arial, Helvetica, sans-serif" font-size="34"
        text-anchor="middle" fill="rgba(255,255,255,0.85)" letter-spacing="2">Sprache lernen · 10 Lektionen</text>

  <!-- Bottom decoration line -->
  <rect x="520" y="530" width="240" height="3" rx="2" fill="rgba(255,255,255,0.5)"/>

  <!-- Small label -->
  <text x="640" y="575" font-family="Arial, Helvetica, sans-serif" font-size="24"
        text-anchor="middle" fill="rgba(255,255,255,0.6)" letter-spacing="3">OPEN LEARN</text>
</svg>
