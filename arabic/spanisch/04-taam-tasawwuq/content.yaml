version: 1
number: 4
title: "الطعام والتسوق"
description: "مفردات الأطعمة وعبارات مهمة عند التسوق باللغة الإسبانية"
sections:
  - title: "الأطعمة"
    explanation: |
      **الأطعمة** في الإسبانية لها جنس نحوي.
      الكلمات مع «el» مذكرة والكلمات مع «la» مؤنثة.
      في الجمع يصبح «el» «los» و«la» تصبح «las».
    examples:
      - q: "el pan"
        a: "الخبز"
        rel:
          - ["pan", "خبز", "اسم، مذكر"]
      - q: "la leche"
        a: "الحليب"
        rel:
          - ["leche", "حليب", "اسم، مؤنث"]
      - q: "el agua"
        a: "الماء"
        rel:
          - ["agua", "ماء", "اسم، مؤنث (لكن el في المفرد)"]
      - q: "la carne"
        a: "اللحم"
        rel:
          - ["carne", "لحم", "اسم، مؤنث"]
      - q: "el pescado"
        a: "السمك"
        rel:
          - ["pescado", "سمك (كطعام)", "اسم، مذكر"]
      - q: "las verduras"
        a: "الخضروات"
        rel:
          - ["verduras", "خضروات (جمع)", "اسم، مؤنث جمع"]
      - q: "la fruta"
        a: "الفاكهة"
        rel:
          - ["fruta", "فاكهة", "اسم، مؤنث"]
      - q: "el arroz"
        a: "الأرز"
        rel:
          - ["arroz", "أرز", "اسم، مذكر"]
  - title: "التسوق"
    explanation: |
      **عند التسوق** تحتاج إلى عبارات مهذبة معينة.
      «Quisiera» هو الشكل المهذب لفعل «querer» (يريد) في صيغة الشرط –
      أكثر لطفاً بكثير من «quiero» (أريد).
    examples:
      - q: "¿Cuánto cuesta?"
        a: "كم الثمن؟"
        rel:
          - ["cuánto", "كم", "كلمة استفهام"]
          - ["cuesta", "يكلف", "فعل costar"]
      - q: "Es muy caro"
        a: "هذا غالٍ جداً"
        rel:
          - ["caro", "غالٍ", "صفة"]
          - ["muy", "جداً", "ظرف"]
      - q: "¿Tiene...?"
        a: "هل عندك...؟"
        rel:
          - ["tiene", "لديه / لديها", "فعل tener، الغائب"]
      - q: "Quisiera..."
        a: "أودّ..."
        rel:
          - ["quisiera", "أودّ / أرغب", "فعل querer، صيغة الشرط"]
      - q: "La cuenta, por favor"
        a: "الفاتورة، من فضلك"
        rel:
          - ["cuenta", "فاتورة / حساب", "اسم، مؤنث"]
          - ["por favor", "من فضلك", "عبارة مهذبة"]
  - title: "الوجبات"
    explanation: |
      **الوجبات** في إسبانيا تتبع إيقاعاً مختلفاً عن البلدان الأخرى.
      الغداء (el almuerzo) هو الوجبة الرئيسية ويُتناول عادة في الساعة ١٤-١٥.
      العشاء (la cena) يكون غالباً بعد الساعة ٢١.
    examples:
      - q: "el desayuno"
        a: "الفطور"
        rel:
          - ["desayuno", "فطور", "اسم، مذكر"]
      - q: "el almuerzo"
        a: "الغداء"
        rel:
          - ["almuerzo", "غداء", "اسم، مذكر"]
      - q: "la cena"
        a: "العشاء"
        rel:
          - ["cena", "عشاء", "اسم، مؤنث"]
      - q: "tener hambre"
        a: "أن يكون جائعاً"
        rel:
          - ["tener", "يملك", "فعل"]
          - ["hambre", "جوع", "اسم، مؤنث"]
      - q: "tener sed"
        a: "أن يكون عطشاناً"
        rel:
          - ["tener", "يملك", "فعل"]
          - ["sed", "عطش", "اسم، مؤنث"]
