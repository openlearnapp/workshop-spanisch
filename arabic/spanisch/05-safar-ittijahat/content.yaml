version: 1
number: 5
title: "السفر والاتجاهات"
description: "وسائل النقل والاتجاهات وعبارات مفيدة للمسافرين باللغة الإسبانية"
sections:
  - title: "وسائل النقل"
    explanation: |
      **وسائل النقل** ضرورية عند السفر. في إسبانيا وأمريكا اللاتينية
      توجد شبكات نقل عام ممتازة. «A pie» تعني مشياً على الأقدام –
      بدون مركبة، فقط بقدميك!
    examples:
      - q: "el avión"
        a: "الطائرة"
        rel:
          - ["avión", "طائرة", "اسم، مذكر"]
      - q: "el tren"
        a: "القطار"
        rel:
          - ["tren", "قطار", "اسم، مذكر"]
      - q: "el autobús"
        a: "الحافلة"
        rel:
          - ["autobús", "حافلة", "اسم، مذكر"]
      - q: "el taxi"
        a: "سيارة الأجرة"
        rel:
          - ["taxi", "سيارة أجرة", "اسم، مذكر"]
      - q: "el coche"
        a: "السيارة"
        rel:
          - ["coche", "سيارة", "اسم، مذكر"]
      - q: "a pie"
        a: "مشياً على الأقدام"
        rel:
          - ["a", "إلى", "حرف جر"]
          - ["pie", "قدم", "اسم، مذكر"]
  - title: "الاتجاهات"
    explanation: |
      **الاتجاهات** تساعدك للوصول إلى وجهتك.
      «Todo recto» هو أهم اتجاه – مباشرة إلى الأمام.
      المسافات تُوصف بـ «cerca» (قريب) و«lejos» (بعيد).
    examples:
      - q: "a la derecha"
        a: "إلى اليمين"
        rel:
          - ["derecha", "يمين", "اسم، مؤنث"]
      - q: "a la izquierda"
        a: "إلى اليسار"
        rel:
          - ["izquierda", "يسار", "اسم، مؤنث"]
      - q: "todo recto"
        a: "مباشرة إلى الأمام"
        rel:
          - ["todo", "كل / تماماً", "صفة"]
          - ["recto", "مستقيم", "صفة"]
      - q: "cerca"
        a: "قريب"
        rel:
          - ["cerca", "قريب", "ظرف"]
      - q: "lejos"
        a: "بعيد"
        rel:
          - ["lejos", "بعيد", "ظرف"]
      - q: "¿Dónde está...?"
        a: "أين يقع...؟"
        rel:
          - ["dónde", "أين", "كلمة استفهام"]
          - ["está", "يقع / يكون", "فعل estar"]
  - title: "في المحطة"
    explanation: |
      **في المحطة وأثناء السفر** تحتاج إلى جمل عملية.
      «Billete» تعني تذكرة – لتذكرة المسرح يُقال «entrada».
      «¿A qué hora sale?» تسأل عن موعد المغادرة.
    examples:
      - q: "un billete"
        a: "تذكرة"
        rel:
          - ["billete", "تذكرة", "اسم، مذكر"]
      - q: "¿A qué hora sale?"
        a: "في أي ساعة يغادر؟"
        rel:
          - ["a qué hora", "في أي ساعة", "سؤال عن الوقت"]
          - ["sale", "يغادر / يخرج", "فعل salir"]
      - q: "¿Dónde está el hotel?"
        a: "أين الفندق؟"
        rel:
          - ["hotel", "فندق", "اسم، مذكر"]
          - ["está", "يقع / يكون", "فعل estar"]
      - q: "la parada de autobús"
        a: "محطة الحافلة"
        rel:
          - ["parada", "محطة / توقف", "اسم، مؤنث"]
          - ["autobús", "حافلة", "اسم، مذكر"]
