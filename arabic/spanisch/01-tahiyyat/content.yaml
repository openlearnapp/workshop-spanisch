version: 1
number: 1
title: "التحيات والأدب"
description: "أهم التحيات والعبارات المهذبة باللغة الإسبانية"
sections:
  - title: "التحيات"
    explanation: |
      **التحيات الإسبانية** جزء أساسي من الثقافة الإسبانية.
      التحية العامة هي «Hola» التي تناسب أي موقف.
      تُستخدم تحيات مختلفة حسب وقت اليوم.
    examples:
      - q: "Hola"
        a: "مرحباً"
        rel:
          - ["Hola", "مرحباً", "تحية غير رسمية"]
      - q: "Buenos días"
        a: "صباح الخير"
        rel:
          - ["buenos", "جيّد", "صفة، جمع"]
          - ["días", "أيام / صباح", "اسم، جمع"]
      - q: "Buenas tardes"
        a: "مساء الخير"
        rel:
          - ["buenas", "جيّدة", "صفة، جمع مؤنث"]
          - ["tardes", "فترات بعد الظهر", "اسم، جمع"]
      - q: "Buenas noches"
        a: "مساء الخير / تصبح على خير"
        rel:
          - ["buenas", "جيّدة", "صفة، جمع مؤنث"]
          - ["noches", "ليالٍ", "اسم، جمع"]
      - q: "Adiós"
        a: "مع السلامة"
        rel:
          - ["Adiós", "مع السلامة", "وداع رسمي"]
      - q: "Hasta luego"
        a: "إلى اللقاء"
        rel:
          - ["hasta", "حتى / إلى", "حرف جر"]
          - ["luego", "لاحقاً / بعد ذلك", "ظرف"]
  - title: "عبارات مهذبة"
    explanation: |
      **الأدب** يلعب دوراً مهماً في اللغة الإسبانية. هذه العبارات الأساسية
      تساعدك على التواصل باحترام في أي موقف.
    examples:
      - q: "Gracias"
        a: "شكراً"
        rel:
          - ["Gracias", "شكراً", "عبارة شكر"]
      - q: "Por favor"
        a: "من فضلك"
        rel:
          - ["por", "من أجل / عبر", "حرف جر"]
          - ["favor", "معروف / لطف", "اسم"]
      - q: "De nada"
        a: "عفواً / لا شكر على واجب"
        rel:
          - ["de", "من", "حرف جر"]
          - ["nada", "لا شيء", "ضمير"]
      - q: "Perdón"
        a: "عذراً"
        rel:
          - ["Perdón", "عذراً", "عبارة مهذبة"]
      - q: "Lo siento"
        a: "أنا آسف"
        rel:
          - ["lo", "ذلك", "ضمير"]
          - ["siento", "أشعر / أندم", "فعل sentir"]
  - title: "تقديم النفس"
    explanation: |
      **تقديم النفس** مهم عند التعرف على أشخاص جدد.
      في الإسبانية يوجد فعلان بمعنى «يكون»: **ser** (دائم) و**estar** (مؤقت).
      للأسماء والأصل يُستخدم **ser**.
    examples:
      - q: "¿Cómo estás?"
        a: "كيف حالك؟"
        rel:
          - ["cómo", "كيف", "كلمة استفهام"]
          - ["estás", "أنت تكون (الآن)", "فعل estar، المخاطب"]
      - q: "Bien, gracias"
        a: "بخير، شكراً"
        rel:
          - ["bien", "جيد / بخير", "ظرف"]
          - ["gracias", "شكراً", "عبارة شكر"]
      - q: "Me llamo..."
        a: "اسمي..."
        rel:
          - ["me", "نفسي", "ضمير انعكاسي"]
          - ["llamo", "أُسمّى / أدعو", "فعل llamarse"]
      - q: "Mucho gusto"
        a: "تشرفنا"
        rel:
          - ["mucho", "كثير / جداً", "صفة"]
          - ["gusto", "سرور / ذوق", "اسم"]
      - q: "¿De dónde eres?"
        a: "من أين أنت؟"
        rel:
          - ["de", "من", "حرف جر"]
          - ["dónde", "أين", "كلمة استفهام"]
          - ["eres", "أنت تكون", "فعل ser، المخاطب"]
