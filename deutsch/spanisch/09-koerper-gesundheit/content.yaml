version: 1
number: 9
title: "Körper und Gesundheit"
description: "Körperteile, Arztbesuche und Gesundheitsausdrücke auf Spanisch"
sections:
  - title: "Körperteile"
    explanation: |
      **Körperteile** werden auf Spanisch oft mit dem bestimmten Artikel verwendet,
      nicht mit dem Possessivpronomen. Man sagt „me duele la cabeza" (mir tut der Kopf weh),
      nicht „mi cabeza". Dies gilt besonders bei Schmerzen und körperlichen Zuständen.
    examples:
      - q: "la cabeza"
        a: "der Kopf"
        rel:
          - ["cabeza", "Kopf", "Substantiv, feminin"]
      - q: "los ojos"
        a: "die Augen"
        rel:
          - ["ojos", "Augen", "Substantiv, maskulin Plural"]
      - q: "la nariz"
        a: "die Nase"
        rel:
          - ["nariz", "Nase", "Substantiv, feminin"]
      - q: "la boca"
        a: "der Mund"
        rel:
          - ["boca", "Mund", "Substantiv, feminin"]
      - q: "el brazo"
        a: "der Arm"
        rel:
          - ["brazo", "Arm", "Substantiv, maskulin"]
      - q: "la mano"
        a: "die Hand"
        rel:
          - ["mano", "Hand", "Substantiv, feminin (unregelmäßig!)"]
      - q: "la pierna"
        a: "das Bein"
        rel:
          - ["pierna", "Bein", "Substantiv, feminin"]
      - q: "el pie"
        a: "der Fuß"
        rel:
          - ["pie", "Fuß", "Substantiv, maskulin"]
  - title: "Beim Arzt"
    explanation: |
      **Beim Arzt** ist es wichtig, Beschwerden klar zu benennen.
      „Me duele + Körperteil" bedeutet „mir tut ... weh".
      „Estar enfermo/a" bedeutet krank sein – man verwendet „estar", nicht „ser".
    examples:
      - q: "Me duele..."
        a: "Mir tut ... weh"
        rel:
          - ["me", "mir", "indirektes Objekt"]
          - ["duele", "tut weh / schmerzt", "Verb doler, 3. Person"]
      - q: "Estoy enfermo / enferma"
        a: "Ich bin krank"
        rel:
          - ["estoy", "ich bin (momentan)", "Verb estar, 1. Person"]
          - ["enfermo", "krank (maskulin)", "Adjektiv"]
          - ["enferma", "krank (feminin)", "Adjektiv"]
      - q: "Tengo fiebre"
        a: "Ich habe Fieber"
        rel:
          - ["tengo", "ich habe", "Verb tener, 1. Person"]
          - ["fiebre", "Fieber", "Substantiv, feminin"]
      - q: "Necesito un médico"
        a: "Ich brauche einen Arzt"
        rel:
          - ["necesito", "ich brauche", "Verb necesitar, 1. Person"]
          - ["médico", "Arzt", "Substantiv, maskulin"]
      - q: "la farmacia"
        a: "die Apotheke"
        rel:
          - ["farmacia", "Apotheke", "Substantiv, feminin"]
  - title: "Gesundheit"
    explanation: |
      **Gesundheitsausdrücke** helfen, das Befinden zu beschreiben.
      „¿Cómo te encuentras?" ist eine fürsorgliche Art zu fragen, wie es jemandem geht.
      Der Unterschied: „sentirse" (sich fühlen) für körperlich-emotionale Zustände.
    examples:
      - q: "¿Cómo te encuentras?"
        a: "Wie fühlst du dich?"
        rel:
          - ["te", "dich / dir", "Reflexivpronomen, 2. Person"]
          - ["encuentras", "du befindest dich / findest dich", "Verb encontrarse"]
      - q: "Me siento bien"
        a: "Ich fühle mich gut"
        rel:
          - ["me siento", "ich fühle mich", "Verb sentirse, 1. Person"]
          - ["bien", "gut", "Adverb"]
      - q: "Me siento mal"
        a: "Ich fühle mich schlecht"
        rel:
          - ["me siento", "ich fühle mich", "Verb sentirse, 1. Person"]
          - ["mal", "schlecht", "Adverb"]
      - q: "Tengo alergia"
        a: "Ich habe eine Allergie"
        rel:
          - ["tengo", "ich habe", "Verb tener, 1. Person"]
          - ["alergia", "Allergie", "Substantiv, feminin"]
      - q: "el hospital"
        a: "das Krankenhaus"
        rel:
          - ["hospital", "Krankenhaus / Spital", "Substantiv, maskulin"]
