version: 1
number: 4
title: "Essen und Einkaufen"
description: "Lebensmittelvokabular und wichtige Ausdrücke beim Einkaufen auf Spanisch"
sections:
  - title: "Lebensmittel"
    explanation: |
      **Lebensmittel** auf Spanisch haben ein grammatisches Geschlecht.
      Wörter mit „el" sind maskulin, Wörter mit „la" sind feminin.
      Im Plural wird „el" zu „los" und „la" zu „las".
    examples:
      - q: "el pan"
        a: "das Brot"
        rel:
          - ["pan", "Brot", "Substantiv, maskulin"]
      - q: "la leche"
        a: "die Milch"
        rel:
          - ["leche", "Milch", "Substantiv, feminin"]
      - q: "el agua"
        a: "das Wasser"
        rel:
          - ["agua", "Wasser", "Substantiv, feminin (aber el im Singular)"]
      - q: "la carne"
        a: "das Fleisch"
        rel:
          - ["carne", "Fleisch", "Substantiv, feminin"]
      - q: "el pescado"
        a: "der Fisch"
        rel:
          - ["pescado", "Fisch (als Speise)", "Substantiv, maskulin"]
      - q: "las verduras"
        a: "das Gemüse"
        rel:
          - ["verduras", "Gemüse (Plural)", "Substantiv, feminin Plural"]
      - q: "la fruta"
        a: "das Obst"
        rel:
          - ["fruta", "Obst / Frucht", "Substantiv, feminin"]
      - q: "el arroz"
        a: "der Reis"
        rel:
          - ["arroz", "Reis", "Substantiv, maskulin"]
  - title: "Einkaufen"
    explanation: |
      **Beim Einkaufen** braucht man bestimmte Höflichkeitsformeln.
      „Quisiera" ist die höfliche Form von „querer" (wollen) im Konjunktiv –
      viel freundlicher als „quiero" (ich will).
    examples:
      - q: "¿Cuánto cuesta?"
        a: "Wie viel kostet das?"
        rel:
          - ["cuánto", "wie viel", "Fragewort"]
          - ["cuesta", "kostet", "Verb costar"]
      - q: "Es muy caro"
        a: "Das ist sehr teuer"
        rel:
          - ["caro", "teuer", "Adjektiv"]
          - ["muy", "sehr", "Adverb"]
      - q: "¿Tiene...?"
        a: "Haben Sie...?"
        rel:
          - ["tiene", "er/sie/es hat", "Verb tener, 3. Person"]
      - q: "Quisiera..."
        a: "Ich hätte gerne..."
        rel:
          - ["quisiera", "ich möchte / hätte gerne", "Verb querer, Konjunktiv"]
      - q: "La cuenta, por favor"
        a: "Die Rechnung, bitte"
        rel:
          - ["cuenta", "Rechnung / Konto", "Substantiv, feminin"]
          - ["por favor", "bitte", "Höflichkeitsausdruck"]
  - title: "Mahlzeiten"
    explanation: |
      **Die Mahlzeiten** folgen in Spanien einem anderen Rhythmus als in Deutschland.
      Das Mittagessen (el almuerzo) ist die Hauptmahlzeit und wird oft erst um 14–15 Uhr eingenommen.
      Das Abendessen (la cena) findet häufig nach 21 Uhr statt.
    examples:
      - q: "el desayuno"
        a: "das Frühstück"
        rel:
          - ["desayuno", "Frühstück", "Substantiv, maskulin"]
      - q: "el almuerzo"
        a: "das Mittagessen"
        rel:
          - ["almuerzo", "Mittagessen", "Substantiv, maskulin"]
      - q: "la cena"
        a: "das Abendessen"
        rel:
          - ["cena", "Abendessen", "Substantiv, feminin"]
      - q: "tener hambre"
        a: "Hunger haben"
        rel:
          - ["tener", "haben", "Verb"]
          - ["hambre", "Hunger", "Substantiv, feminin"]
      - q: "tener sed"
        a: "Durst haben"
        rel:
          - ["tener", "haben", "Verb"]
          - ["sed", "Durst", "Substantiv, feminin"]
