version: 1
number: 10
title: "Verben und Alltag"
description: "Wichtige Verben und tägliche Routinen auf Spanisch"
sections:
  - title: "Wichtige Verben"
    explanation: |
      **Die wichtigsten spanischen Verben** sind oft unregelmäßig, aber unverzichtbar.
      Besonders wichtig: **ser** vs. **estar** – beide bedeuten „sein", aber:
      Ser für dauerhafte Eigenschaften, Nationalität, Zeit. Estar für vorübergehende Zustände und Orte.
    examples:
      - q: "ser / estar"
        a: "sein"
        rel:
          - ["ser", "sein (dauerhaft)", "Verb, unregelmäßig"]
          - ["estar", "sein (vorübergehend / Ort)", "Verb, unregelmäßig"]
      - q: "tener"
        a: "haben"
        rel:
          - ["tener", "haben", "Verb, unregelmäßig"]
      - q: "ir"
        a: "gehen / fahren"
        rel:
          - ["ir", "gehen / fahren", "Verb, unregelmäßig"]
      - q: "querer"
        a: "wollen / lieben"
        rel:
          - ["querer", "wollen / lieben", "Verb, unregelmäßig (e→ie)"]
      - q: "poder"
        a: "können / dürfen"
        rel:
          - ["poder", "können / dürfen", "Verb, unregelmäßig (o→ue)"]
      - q: "saber"
        a: "wissen / können (gelernt)"
        rel:
          - ["saber", "wissen / etwas beherrschen", "Verb, unregelmäßig"]
      - q: "hacer"
        a: "machen / tun"
        rel:
          - ["hacer", "machen / tun", "Verb, unregelmäßig"]
      - q: "decir"
        a: "sagen"
        rel:
          - ["decir", "sagen / sprechen", "Verb, unregelmäßig"]
  - title: "Alltag"
    explanation: |
      **Tägliche Routinen** werden im Spanischen oft mit reflexiven Verben ausgedrückt.
      „Levantarse" (aufstehen), „ducharse" (duschen) – das Reflexivpronomen zeigt,
      dass die Handlung auf die Person selbst gerichtet ist.
    examples:
      - q: "levantarse"
        a: "aufstehen"
        rel:
          - ["levantarse", "aufstehen", "Reflexivverb"]
          - ["levantar", "heben / aufheben", "Basisverb"]
      - q: "desayunar"
        a: "frühstücken"
        rel:
          - ["desayunar", "frühstücken", "Verb"]
      - q: "trabajar"
        a: "arbeiten"
        rel:
          - ["trabajar", "arbeiten", "Verb, regelmäßig"]
      - q: "comer"
        a: "essen / zu Mittag essen"
        rel:
          - ["comer", "essen", "Verb, regelmäßig"]
      - q: "dormir"
        a: "schlafen"
        rel:
          - ["dormir", "schlafen", "Verb, unregelmäßig (o→ue)"]
      - q: "ducharse"
        a: "duschen"
        rel:
          - ["ducharse", "duschen", "Reflexivverb"]
          - ["ducha", "Dusche", "Substantiv, feminin"]
  - title: "Im Büro"
    explanation: |
      **Im Büro und bei der Arbeit** braucht man spezifisches Vokabular.
      Das spanische Wort „ordenador" (Computer) wird vor allem in Spanien verwendet –
      in Lateinamerika sagt man eher „computadora" oder „computador".
    examples:
      - q: "el trabajo"
        a: "die Arbeit / der Job"
        rel:
          - ["trabajo", "Arbeit / Job", "Substantiv, maskulin"]
      - q: "la oficina"
        a: "das Büro"
        rel:
          - ["oficina", "Büro / Amt", "Substantiv, feminin"]
      - q: "el ordenador"
        a: "der Computer"
        rel:
          - ["ordenador", "Computer (Spanien)", "Substantiv, maskulin"]
      - q: "la reunión"
        a: "das Meeting / die Besprechung"
        rel:
          - ["reunión", "Meeting / Treffen", "Substantiv, feminin"]
      - q: "el jefe / la jefa"
        a: "der Chef / die Chefin"
        rel:
          - ["jefe", "Chef / Vorgesetzter (maskulin)", "Substantiv"]
          - ["jefa", "Chefin / Vorgesetzte (feminin)", "Substantiv"]
      - q: "el colega"
        a: "der Kollege"
        rel:
          - ["colega", "Kollege / Kollegin", "Substantiv, maskulin/feminin"]
