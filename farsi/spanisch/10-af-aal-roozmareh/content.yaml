version: 1
number: 10
title: "افعال و زندگی روزمره"
description: "افعال مهم و فعالیت‌های روزانه به زبان اسپانیایی"
sections:
  - title: "افعال مهم"
    explanation: |
      **مهم‌ترین افعال اسپانیایی** اغلب بی‌قاعده هستند، اما ضروری.
      به‌خصوص مهم: **ser** در مقابل **estar** – هر دو یعنی «بودن»، اما:
      Ser برای ویژگی‌های دائمی، ملیت، زمان. Estar برای حالات موقت و مکان‌ها.
    examples:
      - q: "ser / estar"
        a: "بودن"
        rel:
          - ["ser", "بودن (دائمی)", "فعل، بی‌قاعده"]
          - ["estar", "بودن (موقت / مکان)", "فعل، بی‌قاعده"]
      - q: "tener"
        a: "داشتن"
        rel:
          - ["tener", "داشتن", "فعل، بی‌قاعده"]
      - q: "ir"
        a: "رفتن"
        rel:
          - ["ir", "رفتن", "فعل، بی‌قاعده"]
      - q: "querer"
        a: "خواستن / دوست داشتن"
        rel:
          - ["querer", "خواستن / دوست داشتن", "فعل، بی‌قاعده (e→ie)"]
      - q: "poder"
        a: "توانستن"
        rel:
          - ["poder", "توانستن", "فعل، بی‌قاعده (o→ue)"]
      - q: "saber"
        a: "دانستن / بلد بودن"
        rel:
          - ["saber", "دانستن / تسلط داشتن", "فعل، بی‌قاعده"]
      - q: "hacer"
        a: "انجام دادن / ساختن"
        rel:
          - ["hacer", "انجام دادن / ساختن", "فعل، بی‌قاعده"]
      - q: "decir"
        a: "گفتن"
        rel:
          - ["decir", "گفتن", "فعل، بی‌قاعده"]
  - title: "زندگی روزمره"
    explanation: |
      **فعالیت‌های روزانه** در اسپانیایی اغلب با افعال بازتابی بیان می‌شوند.
      «Levantarse» (بلند شدن)، «ducharse» (دوش گرفتن) – ضمیر بازتابی نشان می‌دهد
      که عمل به خود شخص بازمی‌گردد.
    examples:
      - q: "levantarse"
        a: "بلند شدن"
        rel:
          - ["levantarse", "بلند شدن", "فعل بازتابی"]
          - ["levantar", "بلند کردن", "فعل پایه"]
      - q: "desayunar"
        a: "صبحانه خوردن"
        rel:
          - ["desayunar", "صبحانه خوردن", "فعل"]
      - q: "trabajar"
        a: "کار کردن"
        rel:
          - ["trabajar", "کار کردن", "فعل، باقاعده"]
      - q: "comer"
        a: "خوردن / ناهار خوردن"
        rel:
          - ["comer", "خوردن", "فعل، باقاعده"]
      - q: "dormir"
        a: "خوابیدن"
        rel:
          - ["dormir", "خوابیدن", "فعل، بی‌قاعده (o→ue)"]
      - q: "ducharse"
        a: "دوش گرفتن"
        rel:
          - ["ducharse", "دوش گرفتن", "فعل بازتابی"]
          - ["ducha", "دوش", "اسم، مؤنث"]
  - title: "در اداره"
    explanation: |
      **در اداره و محل کار** به واژگان خاصی نیاز دارید.
      کلمه اسپانیایی «ordenador» (کامپیوتر) بیشتر در اسپانیا استفاده می‌شود –
      در آمریکای لاتین بیشتر «computadora» یا «computador» می‌گویند.
    examples:
      - q: "el trabajo"
        a: "کار / شغل"
        rel:
          - ["trabajo", "کار / شغل", "اسم، مذکر"]
      - q: "la oficina"
        a: "اداره / دفتر"
        rel:
          - ["oficina", "اداره / دفتر", "اسم، مؤنث"]
      - q: "el ordenador"
        a: "کامپیوتر"
        rel:
          - ["ordenador", "کامپیوتر (اسپانیا)", "اسم، مذکر"]
      - q: "la reunión"
        a: "جلسه"
        rel:
          - ["reunión", "جلسه / دیدار", "اسم، مؤنث"]
      - q: "el jefe / la jefa"
        a: "رئیس / رئیسه"
        rel:
          - ["jefe", "رئیس (مذکر)", "اسم"]
          - ["jefa", "رئیسه (مؤنث)", "اسم"]
      - q: "el colega"
        a: "همکار"
        rel:
          - ["colega", "همکار", "اسم، مذکر/مؤنث"]
