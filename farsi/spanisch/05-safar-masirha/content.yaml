version: 1
number: 5
title: "سفر و مسیریابی"
description: "وسایل نقلیه، مسیریابی و عبارات مفید برای مسافران به زبان اسپانیایی"
sections:
  - title: "وسایل نقلیه"
    explanation: |
      **وسایل نقلیه** هنگام سفر ضروری هستند. در اسپانیا و آمریکای لاتین
      شبکه‌های حمل‌ونقل عمومی عالی وجود دارد. «A pie» یعنی پیاده –
      بدون وسیله نقلیه، فقط با پای خودتان!
    examples:
      - q: "el avión"
        a: "هواپیما"
        rel:
          - ["avión", "هواپیما", "اسم، مذکر"]
      - q: "el tren"
        a: "قطار"
        rel:
          - ["tren", "قطار", "اسم، مذکر"]
      - q: "el autobús"
        a: "اتوبوس"
        rel:
          - ["autobús", "اتوبوس", "اسم، مذکر"]
      - q: "el taxi"
        a: "تاکسی"
        rel:
          - ["taxi", "تاکسی", "اسم، مذکر"]
      - q: "el coche"
        a: "ماشین"
        rel:
          - ["coche", "ماشین", "اسم، مذکر"]
      - q: "a pie"
        a: "پیاده"
        rel:
          - ["a", "به / تا", "حرف اضافه"]
          - ["pie", "پا", "اسم، مذکر"]
  - title: "مسیریابی"
    explanation: |
      **مسیریابی** به شما کمک می‌کند به مقصد برسید.
      «Todo recto» مهم‌ترین جهت است – مستقیم.
      فاصله‌ها با «cerca» (نزدیک) و «lejos» (دور) بیان می‌شوند.
    examples:
      - q: "a la derecha"
        a: "سمت راست"
        rel:
          - ["derecha", "راست", "اسم، مؤنث"]
      - q: "a la izquierda"
        a: "سمت چپ"
        rel:
          - ["izquierda", "چپ", "اسم، مؤنث"]
      - q: "todo recto"
        a: "مستقیم"
        rel:
          - ["todo", "همه / کاملاً", "صفت"]
          - ["recto", "مستقیم", "صفت"]
      - q: "cerca"
        a: "نزدیک"
        rel:
          - ["cerca", "نزدیک", "قید"]
      - q: "lejos"
        a: "دور"
        rel:
          - ["lejos", "دور", "قید"]
      - q: "¿Dónde está...?"
        a: "...کجاست؟"
        rel:
          - ["dónde", "کجا", "کلمه پرسشی"]
          - ["está", "است (قرار دارد)", "فعل estar"]
  - title: "در ایستگاه"
    explanation: |
      **در ایستگاه و در سفر** به جملات کاربردی نیاز دارید.
      «Billete» یعنی بلیت – برای بلیت تئاتر «entrada» می‌گویند.
      «¿A qué hora sale?» زمان حرکت را می‌پرسد.
    examples:
      - q: "un billete"
        a: "یک بلیت"
        rel:
          - ["billete", "بلیت", "اسم، مذکر"]
      - q: "¿A qué hora sale?"
        a: "ساعت چند حرکت می‌کند؟"
        rel:
          - ["a qué hora", "ساعت چند", "سؤال زمانی"]
          - ["sale", "حرکت می‌کند / خارج می‌شود", "فعل salir"]
      - q: "¿Dónde está el hotel?"
        a: "هتل کجاست؟"
        rel:
          - ["hotel", "هتل", "اسم، مذکر"]
          - ["está", "است (قرار دارد)", "فعل estar"]
      - q: "la parada de autobús"
        a: "ایستگاه اتوبوس"
        rel:
          - ["parada", "ایستگاه / توقف", "اسم، مؤنث"]
          - ["autobús", "اتوبوس", "اسم، مذکر"]
