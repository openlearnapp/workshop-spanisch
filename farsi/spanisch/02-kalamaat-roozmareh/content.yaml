version: 1
number: 2
title: "کلمات روزمره"
description: "کلمات و عبارات پایه‌ای برای استفاده روزانه در زبان اسپانیایی"
sections:
  - title: "کلمات پایه"
    explanation: |
      **کلمات پایه** سنگ‌بنای هر زبانی هستند.
      این کلمات پرکاربرد به شما کمک می‌کنند تا جملات ساده به اسپانیایی بسازید
      و در موقعیت‌های روزمره ارتباط برقرار کنید.
    examples:
      - q: "sí"
        a: "بله"
        rel:
          - ["sí", "بله", "حرف"]
      - q: "no"
        a: "نه"
        rel:
          - ["no", "نه / نیست", "حرف / نفی"]
      - q: "y"
        a: "و"
        rel:
          - ["y", "و", "حرف ربط"]
      - q: "o"
        a: "یا"
        rel:
          - ["o", "یا", "حرف ربط"]
      - q: "pero"
        a: "اما"
        rel:
          - ["pero", "اما", "حرف ربط"]
      - q: "porque"
        a: "چون / زیرا"
        rel:
          - ["porque", "چون / زیرا", "حرف ربط"]
      - q: "también"
        a: "همچنین"
        rel:
          - ["también", "همچنین", "قید"]
      - q: "muy"
        a: "خیلی"
        rel:
          - ["muy", "خیلی", "قید"]
      - q: "bien"
        a: "خوب"
        rel:
          - ["bien", "خوب", "قید"]
      - q: "mal"
        a: "بد"
        rel:
          - ["mal", "بد", "قید"]
  - title: "سؤال‌ها"
    explanation: |
      **کلمات پرسشی** برای کسب اطلاعات ضروری هستند.
      در زبان اسپانیایی، سؤال‌ها با علامت سؤال برعکس (¿) شروع می‌شوند.
      این کلمات پرسشی در موقعیت‌های مختلف به شما کمک می‌کنند.
    examples:
      - q: "¿Qué?"
        a: "چه؟"
        rel:
          - ["qué", "چه", "کلمه پرسشی"]
      - q: "¿Quién?"
        a: "چه کسی؟"
        rel:
          - ["quién", "چه کسی", "کلمه پرسشی"]
      - q: "¿Dónde?"
        a: "کجا؟"
        rel:
          - ["dónde", "کجا", "کلمه پرسشی"]
      - q: "¿Cuándo?"
        a: "کی؟"
        rel:
          - ["cuándo", "کی / چه وقت", "کلمه پرسشی"]
      - q: "¿Por qué?"
        a: "چرا؟"
        rel:
          - ["por qué", "چرا", "کلمه پرسشی"]
      - q: "¿Cómo?"
        a: "چطور؟"
        rel:
          - ["cómo", "چطور / چگونه", "کلمه پرسشی"]
      - q: "¿Cuánto?"
        a: "چقدر؟"
        rel:
          - ["cuánto", "چقدر", "کلمه پرسشی"]
  - title: "روزهای هفته"
    explanation: |
      **روزهای هفته** در اسپانیایی با حرف کوچک نوشته می‌شوند.
      هفته به‌طور سنتی با دوشنبه (lunes) شروع می‌شود.
      آخر هفته «el fin de semana» نامیده می‌شود.
    examples:
      - q: "lunes"
        a: "دوشنبه"
        rel:
          - ["lunes", "دوشنبه", "روز هفته"]
      - q: "martes"
        a: "سه‌شنبه"
        rel:
          - ["martes", "سه‌شنبه", "روز هفته"]
      - q: "miércoles"
        a: "چهارشنبه"
        rel:
          - ["miércoles", "چهارشنبه", "روز هفته"]
      - q: "jueves"
        a: "پنج‌شنبه"
        rel:
          - ["jueves", "پنج‌شنبه", "روز هفته"]
      - q: "viernes"
        a: "جمعه"
        rel:
          - ["viernes", "جمعه", "روز هفته"]
      - q: "sábado"
        a: "شنبه"
        rel:
          - ["sábado", "شنبه", "روز هفته"]
      - q: "domingo"
        a: "یکشنبه"
        rel:
          - ["domingo", "یکشنبه", "روز هفته"]
