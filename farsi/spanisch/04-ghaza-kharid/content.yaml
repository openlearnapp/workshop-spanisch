version: 1
number: 4
title: "غذا و خرید"
description: "واژگان مواد غذایی و عبارات مهم هنگام خرید به زبان اسپانیایی"
sections:
  - title: "مواد غذایی"
    explanation: |
      **مواد غذایی** در اسپانیایی دارای جنسیت دستوری هستند.
      کلمات با «el» مذکر و کلمات با «la» مؤنث هستند.
      در جمع «el» به «los» و «la» به «las» تبدیل می‌شود.
    examples:
      - q: "el pan"
        a: "نان"
        rel:
          - ["pan", "نان", "اسم، مذکر"]
      - q: "la leche"
        a: "شیر"
        rel:
          - ["leche", "شیر", "اسم، مؤنث"]
      - q: "el agua"
        a: "آب"
        rel:
          - ["agua", "آب", "اسم، مؤنث (اما در مفرد el)"]
      - q: "la carne"
        a: "گوشت"
        rel:
          - ["carne", "گوشت", "اسم، مؤنث"]
      - q: "el pescado"
        a: "ماهی"
        rel:
          - ["pescado", "ماهی (غذا)", "اسم، مذکر"]
      - q: "las verduras"
        a: "سبزیجات"
        rel:
          - ["verduras", "سبزیجات (جمع)", "اسم، مؤنث جمع"]
      - q: "la fruta"
        a: "میوه"
        rel:
          - ["fruta", "میوه", "اسم، مؤنث"]
      - q: "el arroz"
        a: "برنج"
        rel:
          - ["arroz", "برنج", "اسم، مذکر"]
  - title: "خرید"
    explanation: |
      **هنگام خرید** به عبارات مؤدبانه خاصی نیاز دارید.
      «Quisiera» شکل مؤدبانه فعل «querer» (خواستن) در وجه التزامی است –
      بسیار مؤدبانه‌تر از «quiero» (می‌خواهم).
    examples:
      - q: "¿Cuánto cuesta?"
        a: "چقدر قیمتش است؟"
        rel:
          - ["cuánto", "چقدر", "کلمه پرسشی"]
          - ["cuesta", "قیمتش است", "فعل costar"]
      - q: "Es muy caro"
        a: "خیلی گران است"
        rel:
          - ["caro", "گران", "صفت"]
          - ["muy", "خیلی", "قید"]
      - q: "¿Tiene...?"
        a: "آیا دارید...؟"
        rel:
          - ["tiene", "او دارد", "فعل tener، سوم شخص"]
      - q: "Quisiera..."
        a: "می‌خواستم..."
        rel:
          - ["quisiera", "می‌خواستم / لطفاً", "فعل querer، وجه التزامی"]
      - q: "La cuenta, por favor"
        a: "صورتحساب، لطفاً"
        rel:
          - ["cuenta", "صورتحساب / حساب", "اسم، مؤنث"]
          - ["por favor", "لطفاً", "عبارت مؤدبانه"]
  - title: "وعده‌های غذایی"
    explanation: |
      **وعده‌های غذایی** در اسپانیا ریتم متفاوتی با سایر کشورها دارند.
      ناهار (el almuerzo) وعده اصلی است و معمولاً ساعت ۱۴ تا ۱۵ صرف می‌شود.
      شام (la cena) اغلب بعد از ساعت ۲۱ سرو می‌شود.
    examples:
      - q: "el desayuno"
        a: "صبحانه"
        rel:
          - ["desayuno", "صبحانه", "اسم، مذکر"]
      - q: "el almuerzo"
        a: "ناهار"
        rel:
          - ["almuerzo", "ناهار", "اسم، مذکر"]
      - q: "la cena"
        a: "شام"
        rel:
          - ["cena", "شام", "اسم، مؤنث"]
      - q: "tener hambre"
        a: "گرسنه بودن"
        rel:
          - ["tener", "داشتن", "فعل"]
          - ["hambre", "گرسنگی", "اسم، مؤنث"]
      - q: "tener sed"
        a: "تشنه بودن"
        rel:
          - ["tener", "داشتن", "فعل"]
          - ["sed", "تشنگی", "اسم، مؤنث"]
