version: 1
number: 1
title: "سلام و احترام"
description: "مهم‌ترین عبارات سلام و احترام‌آمیز در زبان اسپانیایی"
sections:
  - title: "سلام‌ها"
    explanation: |
      **سلام‌های اسپانیایی** بخش مهمی از فرهنگ اسپانیایی هستند.
      سلام عمومی «Hola» است که در هر موقعیتی مناسب است.
      بسته به زمان روز، از عبارات مختلفی استفاده می‌شود.
    examples:
      - q: "Hola"
        a: "سلام"
        rel:
          - ["Hola", "سلام", "سلام غیررسمی"]
      - q: "Buenos días"
        a: "صبح بخیر"
        rel:
          - ["buenos", "خوب", "صفت، جمع"]
          - ["días", "روزها / صبح", "اسم، جمع"]
      - q: "Buenas tardes"
        a: "بعدازظهر بخیر"
        rel:
          - ["buenas", "خوب", "صفت، جمع مؤنث"]
          - ["tardes", "بعدازظهرها", "اسم، جمع"]
      - q: "Buenas noches"
        a: "عصر بخیر / شب بخیر"
        rel:
          - ["buenas", "خوب", "صفت، جمع مؤنث"]
          - ["noches", "شب‌ها", "اسم، جمع"]
      - q: "Adiós"
        a: "خداحافظ"
        rel:
          - ["Adiós", "خداحافظ", "خداحافظی رسمی"]
      - q: "Hasta luego"
        a: "تا بعد"
        rel:
          - ["hasta", "تا", "حرف اضافه"]
          - ["luego", "بعد / سپس", "قید"]
  - title: "عبارات مؤدبانه"
    explanation: |
      **ادب** نقش مهمی در زبان اسپانیایی دارد. این عبارات اساسی
      به شما کمک می‌کنند تا در هر موقعیتی با احترام صحبت کنید.
    examples:
      - q: "Gracias"
        a: "متشکرم"
        rel:
          - ["Gracias", "متشکرم", "عبارت تشکر"]
      - q: "Por favor"
        a: "لطفاً"
        rel:
          - ["por", "برای / از طریق", "حرف اضافه"]
          - ["favor", "لطف / محبت", "اسم"]
      - q: "De nada"
        a: "خواهش می‌کنم"
        rel:
          - ["de", "از", "حرف اضافه"]
          - ["nada", "هیچ", "ضمیر"]
      - q: "Perdón"
        a: "ببخشید"
        rel:
          - ["Perdón", "ببخشید", "عبارت مؤدبانه"]
      - q: "Lo siento"
        a: "متأسفم"
        rel:
          - ["lo", "آن", "ضمیر"]
          - ["siento", "احساس می‌کنم / متأسفم", "فعل sentir"]
  - title: "معرفی خود"
    explanation: |
      **معرفی خود** هنگام آشنایی با افراد جدید مهم است.
      در اسپانیایی دو فعل برای «بودن» وجود دارد: **ser** (دائمی) و **estar** (موقت).
      برای نام و مبدأ از **ser** استفاده می‌شود.
    examples:
      - q: "¿Cómo estás?"
        a: "حالت چطور است؟"
        rel:
          - ["cómo", "چطور / چگونه", "کلمه پرسشی"]
          - ["estás", "تو هستی (الان)", "فعل estar، دوم شخص"]
      - q: "Bien, gracias"
        a: "خوبم، ممنون"
        rel:
          - ["bien", "خوب", "قید"]
          - ["gracias", "ممنون", "عبارت تشکر"]
      - q: "Me llamo..."
        a: "...اسم من است"
        rel:
          - ["me", "خودم / به من", "ضمیر بازتابی"]
          - ["llamo", "نام دارم / صدا می‌زنم", "فعل llamarse"]
      - q: "Mucho gusto"
        a: "خوشبختم"
        rel:
          - ["mucho", "زیاد / خیلی", "صفت"]
          - ["gusto", "خوشی / لذت", "اسم"]
      - q: "¿De dónde eres?"
        a: "اهل کجایی؟"
        rel:
          - ["de", "از", "حرف اضافه"]
          - ["dónde", "کجا", "کلمه پرسشی"]
          - ["eres", "تو هستی", "فعل ser، دوم شخص"]
