version: 1
number: 9
title: "بدن و سلامتی"
description: "اعضای بدن، ویزیت پزشک و عبارات سلامتی به زبان اسپانیایی"
sections:
  - title: "اعضای بدن"
    explanation: |
      **اعضای بدن** در اسپانیایی اغلب با حرف تعریف معین استفاده می‌شوند،
      نه با ضمیر ملکی. می‌گویند «me duele la cabeza» (سرم درد می‌کند)،
      نه «mi cabeza». این به‌خصوص در مورد درد و حالات بدنی صدق می‌کند.
    examples:
      - q: "la cabeza"
        a: "سر"
        rel:
          - ["cabeza", "سر", "اسم، مؤنث"]
      - q: "los ojos"
        a: "چشم‌ها"
        rel:
          - ["ojos", "چشم‌ها", "اسم، مذکر جمع"]
      - q: "la nariz"
        a: "بینی"
        rel:
          - ["nariz", "بینی", "اسم، مؤنث"]
      - q: "la boca"
        a: "دهان"
        rel:
          - ["boca", "دهان", "اسم، مؤنث"]
      - q: "el brazo"
        a: "بازو"
        rel:
          - ["brazo", "بازو", "اسم، مذکر"]
      - q: "la mano"
        a: "دست"
        rel:
          - ["mano", "دست", "اسم، مؤنث (بی‌قاعده!)"]
      - q: "la pierna"
        a: "پا (ران)"
        rel:
          - ["pierna", "پا (ران)", "اسم، مؤنث"]
      - q: "el pie"
        a: "پا (کف)"
        rel:
          - ["pie", "پا (کف)", "اسم، مذکر"]
  - title: "نزد پزشک"
    explanation: |
      **نزد پزشک** مهم است که بتوانید مشکلات خود را واضح بیان کنید.
      «Me duele + عضو بدن» یعنی «... درد می‌کند».
      «Estar enfermo/a» یعنی بیمار بودن – از «estar» استفاده می‌شود، نه «ser».
    examples:
      - q: "Me duele..."
        a: "...درد می‌کند"
        rel:
          - ["me", "برایم", "مفعول غیرمستقیم"]
          - ["duele", "درد می‌کند", "فعل doler، سوم شخص"]
      - q: "Estoy enfermo / enferma"
        a: "مریضم"
        rel:
          - ["estoy", "هستم (الان)", "فعل estar، اول شخص"]
          - ["enfermo", "مریض (مذکر)", "صفت"]
          - ["enferma", "مریض (مؤنث)", "صفت"]
      - q: "Tengo fiebre"
        a: "تب دارم"
        rel:
          - ["tengo", "دارم", "فعل tener، اول شخص"]
          - ["fiebre", "تب", "اسم، مؤنث"]
      - q: "Necesito un médico"
        a: "به پزشک نیاز دارم"
        rel:
          - ["necesito", "نیاز دارم", "فعل necesitar، اول شخص"]
          - ["médico", "پزشک", "اسم، مذکر"]
      - q: "la farmacia"
        a: "داروخانه"
        rel:
          - ["farmacia", "داروخانه", "اسم، مؤنث"]
  - title: "سلامتی"
    explanation: |
      **عبارات سلامتی** به بیان حال و احوال کمک می‌کنند.
      «¿Cómo te encuentras?» روشی دلسوزانه برای پرسیدن حال کسی است.
      تفاوت: «sentirse» (احساس کردن) برای حالات جسمی و عاطفی.
    examples:
      - q: "¿Cómo te encuentras?"
        a: "حالت چطوره؟"
        rel:
          - ["te", "خودت", "ضمیر بازتابی، دوم شخص"]
          - ["encuentras", "خودت را می‌یابی / حالت است", "فعل encontrarse"]
      - q: "Me siento bien"
        a: "حالم خوب است"
        rel:
          - ["me siento", "احساس می‌کنم", "فعل sentirse، اول شخص"]
          - ["bien", "خوب", "قید"]
      - q: "Me siento mal"
        a: "حالم بد است"
        rel:
          - ["me siento", "احساس می‌کنم", "فعل sentirse، اول شخص"]
          - ["mal", "بد", "قید"]
      - q: "Tengo alergia"
        a: "آلرژی دارم"
        rel:
          - ["tengo", "دارم", "فعل tener، اول شخص"]
          - ["alergia", "آلرژی", "اسم، مؤنث"]
      - q: "el hospital"
        a: "بیمارستان"
        rel:
          - ["hospital", "بیمارستان", "اسم، مذکر"]
