version: 1
number: 6
title: "خانواده و افراد"
description: "اعضای خانواده، توصیف افراد و روابط به زبان اسپانیایی"
sections:
  - title: "خانواده"
    explanation: |
      **اعضای خانواده** در اسپانیایی اغلب شکل مذکر و مؤنث دارند.
      «Los abuelos» هم می‌تواند «پدربزرگ‌ها» و هم «پدربزرگ و مادربزرگ» باشد –
      جمع مذکر در اسپانیایی اغلب هر دو جنس را شامل می‌شود.
    examples:
      - q: "la madre"
        a: "مادر"
        rel:
          - ["madre", "مادر", "اسم، مؤنث"]
      - q: "el padre"
        a: "پدر"
        rel:
          - ["padre", "پدر", "اسم، مذکر"]
      - q: "el hermano"
        a: "برادر"
        rel:
          - ["hermano", "برادر", "اسم، مذکر"]
      - q: "la hermana"
        a: "خواهر"
        rel:
          - ["hermana", "خواهر", "اسم، مؤنث"]
      - q: "los abuelos"
        a: "پدربزرگ و مادربزرگ"
        rel:
          - ["abuelos", "پدربزرگ و مادربزرگ", "اسم، مذکر جمع"]
      - q: "el hijo"
        a: "پسر"
        rel:
          - ["hijo", "پسر", "اسم، مذکر"]
      - q: "la hija"
        a: "دختر"
        rel:
          - ["hija", "دختر", "اسم، مؤنث"]
      - q: "los tíos"
        a: "عمو و عمه‌ها"
        rel:
          - ["tíos", "عمو (جمع، شامل عمه‌ها)", "اسم، مذکر جمع"]
  - title: "توصیفات"
    explanation: |
      **صفت‌ها** در اسپانیایی با جنسیت اسم تطابق می‌کنند.
      مذکر اغلب به -o و مؤنث به -a ختم می‌شود.
      مثال: alto (بلند، مذکر) → alta (بلند، مؤنث).
    examples:
      - q: "joven"
        a: "جوان"
        rel:
          - ["joven", "جوان", "صفت، بدون تغییر"]
      - q: "viejo / vieja"
        a: "پیر"
        rel:
          - ["viejo", "پیر (مذکر)", "صفت"]
          - ["vieja", "پیر (مؤنث)", "صفت"]
      - q: "alto / alta"
        a: "بلندقد"
        rel:
          - ["alto", "بلند / بالا (مذکر)", "صفت"]
          - ["alta", "بلند / بالا (مؤنث)", "صفت"]
      - q: "bajo / baja"
        a: "کوتاه‌قد"
        rel:
          - ["bajo", "کوتاه / پایین (مذکر)", "صفت"]
          - ["baja", "کوتاه / پایین (مؤنث)", "صفت"]
      - q: "delgado / delgada"
        a: "لاغر"
        rel:
          - ["delgado", "لاغر (مذکر)", "صفت"]
      - q: "gordo / gorda"
        a: "چاق"
        rel:
          - ["gordo", "چاق (مذکر)", "صفت"]
      - q: "guapo / guapa"
        a: "خوش‌قیافه"
        rel:
          - ["guapo", "خوش‌قیافه (مذکر)", "صفت"]
      - q: "simpático / simpática"
        a: "خوش‌برخورد / مهربان"
        rel:
          - ["simpático", "خوش‌برخورد (مذکر)", "صفت"]
  - title: "روابط"
    explanation: |
      **روابط** در اسپانیایی اغلب با حرف تعریف استفاده می‌شوند.
      در خطاب مستقیم یا با ضمایر ملکی حرف تعریف حذف می‌شود.
      مثال: «mi amigo» (دوست من)، اما «el amigo de María».
    examples:
      - q: "el amigo / la amiga"
        a: "دوست (مرد) / دوست (زن)"
        rel:
          - ["amigo", "دوست (مرد)", "اسم، مذکر"]
          - ["amiga", "دوست (زن)", "اسم، مؤنث"]
      - q: "el novio / la novia"
        a: "دوست‌پسر / دوست‌دختر"
        rel:
          - ["novio", "دوست‌پسر / نامزد", "اسم، مذکر"]
          - ["novia", "دوست‌دختر / نامزد", "اسم، مؤنث"]
      - q: "el marido"
        a: "شوهر"
        rel:
          - ["marido", "شوهر", "اسم، مذکر"]
      - q: "la mujer"
        a: "زن / همسر"
        rel:
          - ["mujer", "زن / همسر", "اسم، مؤنث"]
      - q: "los padres"
        a: "والدین"
        rel:
          - ["padres", "والدین / پدرها", "اسم، مذکر جمع"]
      - q: "los hijos"
        a: "فرزندان"
        rel:
          - ["hijos", "فرزندان / پسرها", "اسم، مذکر جمع"]
