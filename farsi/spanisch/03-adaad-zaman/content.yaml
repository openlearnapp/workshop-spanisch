version: 1
number: 3
title: "اعداد و زمان"
description: "اعداد از ۱ تا ۱۰۰۰ و بیان زمان به زبان اسپانیایی"
sections:
  - title: "اعداد ۱ تا ۲۰"
    explanation: |
      **اعداد ۱ تا ۲۰** در اسپانیایی بی‌قاعده هستند و باید حفظ شوند.
      از ۱۶ به بعد به‌صورت یک کلمه نوشته می‌شوند (dieciséis و غیره).
      این اعداد پایه تمام اعداد بزرگ‌تر هستند.
    examples:
      - q: "uno / dos / tres"
        a: "یک / دو / سه"
        rel:
          - ["uno", "یک", "عدد اصلی"]
          - ["dos", "دو", "عدد اصلی"]
          - ["tres", "سه", "عدد اصلی"]
      - q: "cuatro / cinco / seis"
        a: "چهار / پنج / شش"
        rel:
          - ["cuatro", "چهار", "عدد اصلی"]
          - ["cinco", "پنج", "عدد اصلی"]
          - ["seis", "شش", "عدد اصلی"]
      - q: "siete / ocho / nueve"
        a: "هفت / هشت / نه"
        rel:
          - ["siete", "هفت", "عدد اصلی"]
          - ["ocho", "هشت", "عدد اصلی"]
          - ["nueve", "نه", "عدد اصلی"]
      - q: "diez / once / doce"
        a: "ده / یازده / دوازده"
        rel:
          - ["diez", "ده", "عدد اصلی"]
          - ["once", "یازده", "عدد اصلی"]
          - ["doce", "دوازده", "عدد اصلی"]
      - q: "trece / catorce / quince"
        a: "سیزده / چهارده / پانزده"
        rel:
          - ["trece", "سیزده", "عدد اصلی"]
          - ["catorce", "چهارده", "عدد اصلی"]
          - ["quince", "پانزده", "عدد اصلی"]
      - q: "dieciséis / diecisiete / dieciocho / diecinueve / veinte"
        a: "شانزده / هفده / هجده / نوزده / بیست"
        rel:
          - ["dieciséis", "شانزده", "عدد اصلی"]
          - ["diecisiete", "هفده", "عدد اصلی"]
          - ["dieciocho", "هجده", "عدد اصلی"]
          - ["diecinueve", "نوزده", "عدد اصلی"]
          - ["veinte", "بیست", "عدد اصلی"]
  - title: "اعداد بزرگ"
    explanation: |
      **اعداد بزرگ‌تر** از یک الگوی منظم پیروی می‌کنند. دهگان‌ها به -enta ختم می‌شوند
      (به‌جز treinta) و با «y» (و) به یکان‌ها وصل می‌شوند.
      مثال: treinta y cinco = ۳۵.
    examples:
      - q: "treinta"
        a: "سی"
        rel:
          - ["treinta", "سی", "عدد دهگان"]
      - q: "cuarenta"
        a: "چهل"
        rel:
          - ["cuarenta", "چهل", "عدد دهگان"]
      - q: "cincuenta"
        a: "پنجاه"
        rel:
          - ["cincuenta", "پنجاه", "عدد دهگان"]
      - q: "sesenta / setenta / ochenta / noventa"
        a: "شصت / هفتاد / هشتاد / نود"
        rel:
          - ["sesenta", "شصت", "عدد دهگان"]
          - ["setenta", "هفتاد", "عدد دهگان"]
          - ["ochenta", "هشتاد", "عدد دهگان"]
          - ["noventa", "نود", "عدد دهگان"]
      - q: "cien"
        a: "صد"
        rel:
          - ["cien", "صد (دقیقاً ۱۰۰)", "عدد اصلی"]
      - q: "mil"
        a: "هزار"
        rel:
          - ["mil", "هزار", "عدد اصلی"]
  - title: "ساعت"
    explanation: |
      **ساعت** در اسپانیایی با فعل «ser» بیان می‌شود.
      برای ساعت ۱ می‌گویند «es la una» و برای بقیه ساعت‌ها «son las + عدد».
      دقیقه‌ها با «y» (بعد از ساعت کامل) یا «menos» (قبل از ساعت) اضافه می‌شوند.
    examples:
      - q: "¿Qué hora es?"
        a: "ساعت چند است؟"
        rel:
          - ["qué", "چه / چند", "کلمه پرسشی"]
          - ["hora", "ساعت", "اسم"]
      - q: "Son las tres"
        a: "ساعت سه است"
        rel:
          - ["son", "هستند", "فعل ser، جمع"]
          - ["las", "آن‌ها", "حرف تعریف، جمع مؤنث"]
          - ["tres", "سه", "عدد اصلی"]
      - q: "Es la una"
        a: "ساعت یک است"
        rel:
          - ["es", "است", "فعل ser، مفرد"]
          - ["la una", "ساعت یک", "مفرد، چون فقط یک ساعت"]
      - q: "de la mañana"
        a: "صبح"
        rel:
          - ["mañana", "صبح / فردا", "اسم / قید"]
      - q: "de la tarde"
        a: "بعدازظهر"
        rel:
          - ["tarde", "بعدازظهر / دیر", "اسم / قید"]
      - q: "de la noche"
        a: "شب"
        rel:
          - ["noche", "شب", "اسم"]
