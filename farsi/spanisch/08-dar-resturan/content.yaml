version: 1
number: 8
title: "در رستوران"
description: "سفارش دادن، نام بردن غذاها و پرداخت در رستوران اسپانیایی"
sections:
  - title: "سفارش دادن"
    explanation: |
      **سفارش دادن در رستوران** به عبارات مؤدبانه نیاز دارد.
      «Quisiera» و «para mí» مؤدبانه‌ترین شکل‌ها هستند.
      «¿Me trae...?» به معنای «برایم بیاورید...؟» است و بسیار رایج است.
    examples:
      - q: "Quisiera..."
        a: "می‌خواستم..."
        rel:
          - ["quisiera", "می‌خواستم / لطفاً", "فعل querer، وجه التزامی ماضی"]
      - q: "Para mí..."
        a: "برای من..."
        rel:
          - ["para", "برای", "حرف اضافه"]
          - ["mí", "من", "ضمیر شخصی تأکیدی"]
      - q: "¿Me trae...?"
        a: "برایم بیاورید...؟"
        rel:
          - ["me", "برایم", "ضمیر شخصی، مفعول غیرمستقیم"]
          - ["trae", "می‌آورد", "فعل traer، سوم شخص"]
      - q: "¿Qué recomienda?"
        a: "چه پیشنهاد می‌کنید؟"
        rel:
          - ["recomienda", "پیشنهاد می‌کند", "فعل recomendar، سوم شخص"]
      - q: "La carta, por favor"
        a: "منو، لطفاً"
        rel:
          - ["carta", "نامه / منو", "اسم، مؤنث"]
          - ["por favor", "لطفاً", "عبارت مؤدبانه"]
  - title: "غذاها"
    explanation: |
      **غذاهای معمول** آشپزی اسپانیایی در سراسر جهان شناخته شده‌اند.
      تاپاس، پائیا و گاسپاچو تنها چند نمونه هستند.
      در رستوران‌ها اغلب «menú del día» وجود دارد – یک منوی روزانه ارزان.
    examples:
      - q: "la sopa"
        a: "سوپ"
        rel:
          - ["sopa", "سوپ", "اسم، مؤنث"]
      - q: "la ensalada"
        a: "سالاد"
        rel:
          - ["ensalada", "سالاد", "اسم، مؤنث"]
      - q: "el filete"
        a: "استیک / فیله"
        rel:
          - ["filete", "استیک / فیله", "اسم، مذکر"]
      - q: "el pollo"
        a: "مرغ"
        rel:
          - ["pollo", "مرغ", "اسم، مذکر"]
      - q: "los mariscos"
        a: "غذاهای دریایی"
        rel:
          - ["mariscos", "غذاهای دریایی", "اسم، مذکر جمع"]
      - q: "el postre"
        a: "دسر"
        rel:
          - ["postre", "دسر", "اسم، مذکر"]
      - q: "el vino"
        a: "شراب"
        rel:
          - ["vino", "شراب", "اسم، مذکر"]
      - q: "la cerveza"
        a: "آبجو"
        rel:
          - ["cerveza", "آبجو", "اسم، مؤنث"]
  - title: "پرداخت"
    explanation: |
      **هنگام پرداخت** «La cuenta, por favor» مهم‌ترین جمله است.
      در اسپانیا انعام (propina) اختیاری است، اما خوشحال‌کننده.
      کارت اعتباری همه‌جا پذیرفته نمی‌شود – قبلاً بپرسید!
    examples:
      - q: "La cuenta, por favor"
        a: "صورتحساب، لطفاً"
        rel:
          - ["cuenta", "صورتحساب / حساب", "اسم، مؤنث"]
      - q: "¿Está incluido el servicio?"
        a: "آیا هزینه سرویس شامل شده؟"
        rel:
          - ["incluido", "شامل شده", "اسم مفعول"]
          - ["servicio", "سرویس / خدمات", "اسم، مذکر"]
      - q: "¿Se puede pagar con tarjeta?"
        a: "می‌شود با کارت پرداخت کرد؟"
        rel:
          - ["se puede", "می‌شود", "ساختار بازتابی + فعل poder"]
          - ["pagar", "پرداخت کردن", "مصدر"]
          - ["tarjeta", "کارت", "اسم، مؤنث"]
      - q: "propina"
        a: "انعام"
        rel:
          - ["propina", "انعام", "اسم، مؤنث"]
