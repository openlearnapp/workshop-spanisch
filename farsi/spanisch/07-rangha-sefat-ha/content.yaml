version: 1
number: 7
title: "رنگ‌ها و صفت‌ها"
description: "رنگ‌ها، اندازه‌ها و ویژگی‌ها به زبان اسپانیایی"
sections:
  - title: "رنگ‌ها"
    explanation: |
      **رنگ‌ها** در اسپانیایی صفت هستند و با اسم تطابق می‌کنند.
      برخی رنگ‌ها فقط یک شکل برای مذکر و مؤنث دارند (مثلاً azul، verde).
      رنگ‌ها معمولاً بعد از اسم می‌آیند: «el coche rojo» (ماشین قرمز).
    examples:
      - q: "rojo / roja"
        a: "قرمز"
        rel:
          - ["rojo", "قرمز (مذکر)", "صفت رنگ"]
          - ["roja", "قرمز (مؤنث)", "صفت رنگ"]
      - q: "azul"
        a: "آبی"
        rel:
          - ["azul", "آبی", "صفت رنگ، بدون تغییر"]
      - q: "verde"
        a: "سبز"
        rel:
          - ["verde", "سبز", "صفت رنگ، بدون تغییر"]
      - q: "amarillo / amarilla"
        a: "زرد"
        rel:
          - ["amarillo", "زرد (مذکر)", "صفت رنگ"]
      - q: "blanco / blanca"
        a: "سفید"
        rel:
          - ["blanco", "سفید (مذکر)", "صفت رنگ"]
      - q: "negro / negra"
        a: "سیاه"
        rel:
          - ["negro", "سیاه (مذکر)", "صفت رنگ"]
      - q: "naranja"
        a: "نارنجی"
        rel:
          - ["naranja", "نارنجی", "صفت رنگ، بدون تغییر"]
      - q: "rosa"
        a: "صورتی"
        rel:
          - ["rosa", "صورتی", "صفت رنگ، بدون تغییر"]
      - q: "marrón"
        a: "قهوه‌ای"
        rel:
          - ["marrón", "قهوه‌ای", "صفت رنگ"]
      - q: "gris"
        a: "خاکستری"
        rel:
          - ["gris", "خاکستری", "صفت رنگ، بدون تغییر"]
  - title: "اندازه و شکل"
    explanation: |
      **اندازه و شکل** با صفت‌هایی توصیف می‌شوند که بعد از اسم می‌آیند.
      «Grande» قبل از اسم به «gran» کوتاه می‌شود: «un gran hombre» (مرد بزرگ).
      این صفت‌ها برای توصیف اشیا مفید هستند.
    examples:
      - q: "grande"
        a: "بزرگ"
        rel:
          - ["grande", "بزرگ", "صفت"]
      - q: "pequeño / pequeña"
        a: "کوچک"
        rel:
          - ["pequeño", "کوچک (مذکر)", "صفت"]
      - q: "largo / larga"
        a: "بلند / دراز"
        rel:
          - ["largo", "بلند / دراز (مذکر)", "صفت"]
      - q: "corto / corta"
        a: "کوتاه"
        rel:
          - ["corto", "کوتاه (مذکر)", "صفت"]
      - q: "redondo / redonda"
        a: "گرد"
        rel:
          - ["redondo", "گرد (مذکر)", "صفت"]
      - q: "cuadrado / cuadrada"
        a: "مربع"
        rel:
          - ["cuadrado", "مربع (مذکر)", "صفت"]
  - title: "ویژگی‌ها"
    explanation: |
      **ویژگی‌ها** به توصیف اشیا و افراد کمک می‌کنند.
      با این صفت‌ها می‌توانید اشیا، موقعیت‌ها و تجربیات
      را دقیقاً توصیف کنید. به تطابق جنسیتی توجه کنید!
    examples:
      - q: "nuevo / nueva"
        a: "جدید / نو"
        rel:
          - ["nuevo", "جدید (مذکر)", "صفت"]
      - q: "viejo / vieja"
        a: "قدیمی / کهنه"
        rel:
          - ["viejo", "قدیمی (مذکر)", "صفت"]
      - q: "bonito / bonita"
        a: "زیبا / قشنگ"
        rel:
          - ["bonito", "زیبا (مذکر)", "صفت"]
      - q: "feo / fea"
        a: "زشت"
        rel:
          - ["feo", "زشت (مذکر)", "صفت"]
      - q: "rápido / rápida"
        a: "سریع"
        rel:
          - ["rápido", "سریع (مذکر)", "صفت"]
      - q: "lento / lenta"
        a: "آهسته / کند"
        rel:
          - ["lento", "آهسته (مذکر)", "صفت"]
      - q: "fácil"
        a: "آسان"
        rel:
          - ["fácil", "آسان", "صفت، بدون تغییر"]
      - q: "difícil"
        a: "سخت / دشوار"
        rel:
          - ["difícil", "سخت / دشوار", "صفت، بدون تغییر"]
