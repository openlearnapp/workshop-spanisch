version: 1
number: 7
title: "Colors and Adjectives"
description: "Colors, sizes and properties in Spanish"
sections:
  - title: "Colors"
    explanation: |
      **Colors** in Spanish are adjectives and agree with the noun.
      Some colors have only one form for masculine and feminine (e.g., azul, verde).
      Colors usually follow the noun: "el coche rojo" (the red car).
    examples:
      - q: "rojo / roja"
        a: "red"
        rel:
          - ["rojo", "red (masculine)", "color adjective"]
          - ["roja", "red (feminine)", "color adjective"]
      - q: "azul"
        a: "blue"
        rel:
          - ["azul", "blue", "color adjective, invariable"]
      - q: "verde"
        a: "green"
        rel:
          - ["verde", "green", "color adjective, invariable"]
      - q: "amarillo / amarilla"
        a: "yellow"
        rel:
          - ["amarillo", "yellow (masculine)", "color adjective"]
      - q: "blanco / blanca"
        a: "white"
        rel:
          - ["blanco", "white (masculine)", "color adjective"]
      - q: "negro / negra"
        a: "black"
        rel:
          - ["negro", "black (masculine)", "color adjective"]
      - q: "naranja"
        a: "orange"
        rel:
          - ["naranja", "orange", "color adjective, invariable"]
      - q: "rosa"
        a: "pink"
        rel:
          - ["rosa", "pink / rose", "color adjective, invariable"]
      - q: "marrón"
        a: "brown"
        rel:
          - ["marrón", "brown", "color adjective"]
      - q: "gris"
        a: "gray"
        rel:
          - ["gris", "gray", "color adjective, invariable"]
  - title: "Size and Shape"
    explanation: |
      **Size and shape** are described with adjectives that follow the noun.
      "Grande" is shortened to "gran" before a noun: "un gran hombre" (a great man).
      These adjectives are useful when describing objects.
    examples:
      - q: "grande"
        a: "big / large"
        rel:
          - ["grande", "big / large", "adjective"]
      - q: "pequeño / pequeña"
        a: "small / little"
        rel:
          - ["pequeño", "small (masculine)", "adjective"]
      - q: "largo / larga"
        a: "long"
        rel:
          - ["largo", "long (masculine)", "adjective"]
      - q: "corto / corta"
        a: "short"
        rel:
          - ["corto", "short (masculine)", "adjective"]
      - q: "redondo / redonda"
        a: "round"
        rel:
          - ["redondo", "round (masculine)", "adjective"]
      - q: "cuadrado / cuadrada"
        a: "square"
        rel:
          - ["cuadrado", "square (masculine)", "adjective"]
  - title: "Properties"
    explanation: |
      **Properties** help to describe things and people.
      With these adjectives you can precisely characterize objects, situations and experiences.
      Remember to match the gender of the adjective to the noun!
    examples:
      - q: "nuevo / nueva"
        a: "new"
        rel:
          - ["nuevo", "new (masculine)", "adjective"]
      - q: "viejo / vieja"
        a: "old"
        rel:
          - ["viejo", "old (masculine)", "adjective"]
      - q: "bonito / bonita"
        a: "pretty / nice"
        rel:
          - ["bonito", "pretty / nice (masculine)", "adjective"]
      - q: "feo / fea"
        a: "ugly"
        rel:
          - ["feo", "ugly (masculine)", "adjective"]
      - q: "rápido / rápida"
        a: "fast / quick"
        rel:
          - ["rápido", "fast (masculine)", "adjective"]
      - q: "lento / lenta"
        a: "slow"
        rel:
          - ["lento", "slow (masculine)", "adjective"]
      - q: "fácil"
        a: "easy"
        rel:
          - ["fácil", "easy / simple", "adjective, invariable"]
      - q: "difícil"
        a: "difficult / hard"
        rel:
          - ["difícil", "difficult / hard", "adjective, invariable"]
