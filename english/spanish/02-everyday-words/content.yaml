version: 1
number: 2
title: "Everyday Words"
description: "Basic words and expressions for daily use in Spanish"
sections:
  - title: "Basic Words"
    explanation: |
      **Basic words** are the building blocks of any language.
      These frequently used words help you form simple sentences in Spanish
      and communicate in everyday situations.
    examples:
      - q: "sí"
        a: "yes"
        rel:
          - ["sí", "yes", "particle"]
      - q: "no"
        a: "no"
        rel:
          - ["no", "no / not", "particle / negation"]
      - q: "y"
        a: "and"
        rel:
          - ["y", "and", "conjunction"]
      - q: "o"
        a: "or"
        rel:
          - ["o", "or", "conjunction"]
      - q: "pero"
        a: "but"
        rel:
          - ["pero", "but", "conjunction"]
      - q: "porque"
        a: "because"
        rel:
          - ["porque", "because", "conjunction"]
      - q: "también"
        a: "also / too"
        rel:
          - ["también", "also / too", "adverb"]
      - q: "muy"
        a: "very"
        rel:
          - ["muy", "very", "adverb"]
      - q: "bien"
        a: "well / good"
        rel:
          - ["bien", "well / good", "adverb"]
      - q: "mal"
        a: "bad / badly"
        rel:
          - ["mal", "bad / badly", "adverb"]
  - title: "Questions"
    explanation: |
      **Question words** are essential for gathering information.
      In Spanish, questions are introduced with an inverted question mark (¿).
      These question words will help you in a wide variety of situations.
    examples:
      - q: "¿Qué?"
        a: "What?"
        rel:
          - ["qué", "what", "question word"]
      - q: "¿Quién?"
        a: "Who?"
        rel:
          - ["quién", "who", "question word"]
      - q: "¿Dónde?"
        a: "Where?"
        rel:
          - ["dónde", "where", "question word"]
      - q: "¿Cuándo?"
        a: "When?"
        rel:
          - ["cuándo", "when", "question word"]
      - q: "¿Por qué?"
        a: "Why?"
        rel:
          - ["por qué", "why", "question word"]
      - q: "¿Cómo?"
        a: "How?"
        rel:
          - ["cómo", "how", "question word"]
      - q: "¿Cuánto?"
        a: "How much?"
        rel:
          - ["cuánto", "how much / how many", "question word"]
  - title: "Days of the Week"
    explanation: |
      **The days of the week** in Spanish are written in lowercase and
      mostly derive from Latin planet names. The week traditionally starts
      on Monday (lunes). The weekend is "el fin de semana".
    examples:
      - q: "lunes"
        a: "Monday"
        rel:
          - ["lunes", "Monday", "day of the week"]
      - q: "martes"
        a: "Tuesday"
        rel:
          - ["martes", "Tuesday", "day of the week"]
      - q: "miércoles"
        a: "Wednesday"
        rel:
          - ["miércoles", "Wednesday", "day of the week"]
      - q: "jueves"
        a: "Thursday"
        rel:
          - ["jueves", "Thursday", "day of the week"]
      - q: "viernes"
        a: "Friday"
        rel:
          - ["viernes", "Friday", "day of the week"]
      - q: "sábado"
        a: "Saturday"
        rel:
          - ["sábado", "Saturday", "day of the week"]
      - q: "domingo"
        a: "Sunday"
        rel:
          - ["domingo", "Sunday", "day of the week"]
